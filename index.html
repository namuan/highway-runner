<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Tunnel Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: #050508;
    overflow: hidden;
    color: #e0e0e0;
    user-select: none;
  }

  canvas { display: block; }

  /* --- UI Overlay --- */
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #ui > * { pointer-events: auto; }

  /* Top bar: title + stats */
  #top-bar {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 28px;
    font-size: 13px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  #top-bar .title {
    font-weight: 700;
    font-size: 15px;
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #top-bar .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #aaa;
  }

  #top-bar .stat .value {
    color: #fff;
    font-weight: 600;
    min-width: 28px;
  }

  /* Bottom controls panel */
  #controls {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 32px;
    font-size: 13px;
  }

  #controls .group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #controls label {
    color: #999;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  #controls input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 4px;
    border-radius: 2px;
    background: #333;
    outline: none;
  }

  #controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: 0.15s;
  }
  #controls input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  #controls input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    cursor: pointer;
    border: none;
  }

  #controls .value-display {
    color: #fff;
    font-weight: 600;
    min-width: 32px;
    text-align: center;
    font-size: 13px;
  }

  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: 0.2s;
  }
  .btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .btn:active { transform: scale(0.96); }

  /* --- Speed gauge --- */
  #speed-gauge {
    position: fixed;
    bottom: 120px; right: 24px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px 20px;
    text-align: center;
    min-width: 100px;
  }
  #speed-gauge .mph {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -2px;
    color: #fff;
    line-height: 1;
  }
  #speed-gauge .mph.warn { color: #ff9944; }
  #speed-gauge .mph.danger { color: #ff3333; }
  #speed-gauge .mph.overspeed { color: #ff4400; text-shadow: 0 0 20px rgba(255,68,0,0.6); }
  #speed-gauge .overspeed-label {
    display: none;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ff4400;
    margin-top: 2px;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  #speed-gauge .overspeed-label.active { display: block; }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  #speed-gauge .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #888;
    margin-top: 4px;
  }

  /* --- Game Over overlay --- */
  #game-over {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    flex-direction: column;
    gap: 16px;
  }
  #game-over.active { display: flex; }
  #game-over h2 {
    font-size: 36px;
    font-weight: 800;
    color: #ff4444;
    letter-spacing: -1px;
  }
  #game-over .final-score {
    font-size: 18px;
    color: #ccc;
  }
  #game-over .final-score span {
    color: #ffcc00;
    font-weight: 700;
  }
  #game-over .btn {
    font-size: 14px;
    padding: 10px 28px;
    margin-top: 8px;
  }

  /* --- Lane indicator --- */
  #lane-indicator {
    position: fixed;
    bottom: 120px; left: 24px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 8px 14px;
    display: flex;
    gap: 6px;
  }
  #lane-indicator .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.2s;
  }
  #lane-indicator .dot.active { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

  .btn-primary {
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    border: none;
    color: #000;
  }
  .btn-primary:hover {
    opacity: 0.9;
    color: #000;
  }

  /* Responsive */
  @media (max-width: 820px) {
    #top-bar { font-size: 11px; padding: 8px 14px; gap: 14px; flex-wrap: wrap; justify-content: center; }
    #controls { flex-wrap: wrap; justify-content: center; gap: 14px; padding: 12px 16px; max-width: 95vw; }
    #controls input[type="range"] { width: 72px; }
  }

  @media (max-width: 480px) {
    #controls .group { gap: 6px; }
    #controls input[type="range"] { width: 56px; }
  }
</style>
</head>
<body>

<div id="ui">
  <!-- Top bar -->
  <div id="top-bar">
    <span class="title">🏎️ Tunnel Runner</span>
    <span class="stat">📏 <span class="value" id="score">0</span>m</span>
    <span class="stat">🚗 <span class="value" id="car-count">0</span></span>
  </div>

  <!-- Speed gauge -->
  <div id="speed-gauge">
    <div class="mph" id="mph-display">0</div>
    <div class="label">mph</div>
    <div class="overspeed-label" id="overspeed-label">⚠ OVERSPEED</div>
  </div>

  <!-- Lane indicator -->
  <div id="lane-indicator">
    <div class="dot" id="lane-dot-0"></div>
    <div class="dot" id="lane-dot-1"></div>
  </div>

  <!-- Game Over overlay -->
  <div id="game-over">
    <h2>💥 CRASH</h2>
    <div class="final-score">Distance: <span id="final-score">0</span> m</div>
    <button class="btn btn-primary" id="btn-restart">🔄 Play Again</button>
  </div>

  <!-- Bottom controls -->
  <div id="controls">
    <span style="color:#888;font-size:11px">W/↑ Accel &nbsp; S/↓ Brake &nbsp; A/← D/→ Lane &nbsp; <b>V</b> View &nbsp; <b>R</b> Reverse</span>
    <button class="btn" id="btn-view">🎥 FPV</button>
    <button class="btn" id="btn-time">🌙 Night</button>
    <button class="btn" id="btn-reset">⟳ Reset</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
//  CONFIGURATION
// ============================================================
const CONFIG = {
  roadLength: 3200,
  roadHalfWidth: 3.75,
  laneWidth: 3.5,
  carColors: [
    0xe74c3c, 0x3498db, 0x2ecc71, 0xf1c40f, 0xffffff,
    0x333333, 0x95a5a6, 0xe67e22, 0x9b59b6, 0x1abc9c,
    0xe91e63, 0x795548, 0x00bcd4, 0xff5722,
  ],
  carMinSpeed: 12,
  carMaxSpeed: 22,
  carAccel: 10,
  carBrake: 18,
  carLength: 4.0,
  carWidth: 1.8,
  carBodyHeight: 0.55,
  carCabinHeight: 0.35,
  wheelRadius: 0.25,
  wheelWidth: 0.18,
  spawnIntervalBase: 1.2,
  // Random slowdown events trigger braking shockwaves
  slowdownChance: 0.0004,
  slowdownDuration: 2.5,
  // Player car
  playerColor: 0x00ccff,
  playerAccel: 14,
  playerBrake: 22,
  playerMaxSpeed: 120,
  minSafeSpeed: 10,    // mph threshold before underspeed penalty
  // Tunnel config
  tunnelHeight: 5.5,
  tunnelLightSpacing: 5.0,
  tunnelRibSpacing: 8.0,
};

// ============================================================
//  GLOBALS
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.001);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1200);
camera.position.set(0, 75, 0.01);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.05;
controls.minDistance = 1;
controls.maxDistance = 200;
controls.update();

// World group for tunnel/road geometry (shifted for infinite wrapping)
const worldGroup = new THREE.Group();
scene.add(worldGroup);

// ============================================================
//  TUNNEL LIGHTING
// ============================================================
// Bright ambient — daytime tunnel interior
const ambient = new THREE.AmbientLight(0xffffee, 1.5);
scene.add(ambient);

// Warm directional light simulating tunnel lighting wash
const tunnelLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
tunnelLight.position.set(0, 14, 0);
tunnelLight.castShadow = true;
tunnelLight.shadow.mapSize.width = 1024;
tunnelLight.shadow.mapSize.height = 1024;
tunnelLight.shadow.camera.near = 1;
tunnelLight.shadow.camera.far = 200;
tunnelLight.shadow.camera.left = -80;
tunnelLight.shadow.camera.right = 80;
tunnelLight.shadow.camera.top = 80;
tunnelLight.shadow.camera.bottom = -80;
scene.add(tunnelLight);

// Bright fill lights
const fillFront = new THREE.DirectionalLight(0xaaccff, 0.5);
fillFront.position.set(0, 2, 30);
scene.add(fillFront);

const fillBack = new THREE.DirectionalLight(0xffccaa, 0.3);
fillBack.position.set(0, 2, -30);
scene.add(fillBack);

// Road surface (dark asphalt)
const roadBaseMat = new THREE.MeshStandardMaterial({
  color: 0x555555,
  roughness: 0.9,
  metalness: 0.0,
});
const roadBase = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadLength + 40, 50), roadBaseMat);
roadBase.rotation.x = -Math.PI / 2;
roadBase.position.y = -0.05;
roadBase.receiveShadow = true;
worldGroup.add(roadBase);

// ============================================================
//  ROAD SYSTEM — single 4‑lane tunnel road (X‑axis)
// ============================================================
const laneDefs = [];
const cars = [];
let carIdCounter = 0;

// ============================================================
//  GAME STATE
// ============================================================
let playerCar = null;
let gameOver = false;
let score = 0;
let lastProgress = 0;
let viewMode = 'top'; // 'top' or 'fpv'
let timeOfDay = 'day';  // 'day' or 'night'
let chaseDistance = 3;
// Keyboard state
const keys = { w: false, s: false, a: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

const RL = CONFIG.roadHalfWidth;
const LW = CONFIG.laneWidth;

function buildTunnelRoad() {
  const length = CONFIG.roadLength;
  const halfW = CONFIG.roadHalfWidth;

  // Road surface
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.85, metalness: 0.05 });
  const road = new THREE.Mesh(new THREE.PlaneGeometry(length, halfW * 2), roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0, 0);
  road.receiveShadow = true;
  worldGroup.add(road);

  // Lane markings (dashed) - center divider only
  const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.6 });
  const dividerOffsets = [0]; // center line only
  for (const offset of dividerOffsets) {
    for (let seg = 0; seg < 60; seg++) {
      const t = seg / 60;
      const pos = (t - 0.5) * (length - 4);
      const dashLen = 2.0, gapLen = 2.5;
      const cyclePos = ((pos + length / 2) % (dashLen + gapLen));
      if (cyclePos > dashLen) continue;
      const dash = new THREE.Mesh(
        new THREE.PlaneGeometry(dashLen, 0.15),
        lineMat
      );
      dash.rotation.x = -Math.PI / 2;
      dash.position.set(pos, 0.01, offset);
      worldGroup.add(dash);
    }
  }

  // Edge lines (solid)
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  for (const side of [-1, 1]) {
    const edge = new THREE.Mesh(
      new THREE.PlaneGeometry(length, 0.2),
      edgeMat
    );
    edge.rotation.x = -Math.PI / 2;
    edge.position.set(0, 0.015, side * (halfW - 0.15));
    worldGroup.add(edge);
  }

  // Sidewalks / kerbs
  for (const side of [-1, 1]) {
    const sw = new THREE.Mesh(
      new THREE.BoxGeometry(length, 0.15, 0.8),
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 })
    );
    sw.position.set(0, 0.075, side * (halfW + 0.4));
    sw.receiveShadow = true;
    worldGroup.add(sw);
  }

  // Road studs (cats eyes) — small reflective dots along lane lines
  const studMat = new THREE.MeshStandardMaterial({
    color: 0xffffaa,
    emissive: 0xffffaa,
    emissiveIntensity: 0.15,
    roughness: 0.3,
  });
  for (const offset of dividerOffsets) {
    for (let x = -length / 2 + 3; x < length / 2 - 3; x += 4) {
      const stud = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), studMat);
      stud.position.set(x, 0.04, offset);
      worldGroup.add(stud);
    }
  }

  // ----- Lanes -----  (2 eastbound lanes, centered)
  const startX = -length / 2;
  const endX   =  length / 2;

  // Two lanes: z = -1.75 and z = 1.75, both eastbound (+X)
  const laneZs = [-LW/2, LW/2];
  for (let i = 0; i < 2; i++) {
    laneDefs.push({
      id: `lane_w${i}`, road: 'x', dir: [-1,0,0],
      start: new THREE.Vector3(endX,   0, laneZs[i]),
      end:   new THREE.Vector3(startX, 0, laneZs[i]),
    });
  }
}

function finalizeLanes() {
  for (const def of laneDefs) {
    def.dirVec = new THREE.Vector3(def.dir[0], def.dir[1], def.dir[2]);
    def.length = def.start.distanceTo(def.end);
    def.cars = [];
  }
}

buildTunnelRoad();
finalizeLanes();

// ============================================================
//  TUNNEL ENVIRONMENT — full-length enclosed tunnel
// ============================================================
function buildFullTunnel() {
  const length = CONFIG.roadLength;
  const halfW = CONFIG.roadHalfWidth;
  const height = CONFIG.tunnelHeight;
  const wallThick = 0.4;
  const ceilThick = 0.35;
  const tunnelHalfW = halfW + 1.8; // wall-to-wall half width
  const midX = 0;

  // ---- Materials ----
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0xaaaacc, roughness: 0.7, metalness: 0.05,
  });
  const ribMat = new THREE.MeshStandardMaterial({
    color: 0x9999aa, roughness: 0.5, metalness: 0.1,
  });
  const baseMat = new THREE.MeshStandardMaterial({
    color: 0x777777, roughness: 0.85,
  });
  const stripeMat = new THREE.MeshStandardMaterial({
    color: 0x999999, roughness: 0.5,
  });
  const emergencyMat = new THREE.MeshStandardMaterial({
    color: 0x00ff44, emissive: 0x00ff44,
    emissiveIntensity: 0.4, roughness: 0.2,
  });

  // ---- Main side walls ----
  for (const side of [-1, 1]) {
    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(length, height, wallThick),
      wallMat
    );
    wall.position.set(midX, height / 2, side * tunnelHalfW);
    wall.castShadow = true;
    wall.receiveShadow = true;
    worldGroup.add(wall);

    // Dark base strip (bottom 0.6 units)
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(length, 0.6, wallThick + 0.02),
      baseMat
    );
    base.position.set(midX, 0.3, side * tunnelHalfW);
    worldGroup.add(base);

    // Horizontal wall stripes every 8 units (depth reference)
    for (let x = -length / 2 + 2; x < length / 2 - 2; x += 8) {
      // Stripe at 1.5m height
      const s1 = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.08, 0.05),
        stripeMat
      );
      s1.position.set(x, 1.5, side * (tunnelHalfW + 0.01));
      worldGroup.add(s1);

      // Stripe at 3.0m height
      const s2 = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.08, 0.05),
        stripeMat
      );
      s2.position.set(x, 3.0, side * (tunnelHalfW + 0.01));
      worldGroup.add(s2);
    }
  }

  // ---- Ceiling ---- (removed — open-top view)

  // ---- Darken road inside tunnel (already dark, but add subtle strip) ----
  const roadDark = new THREE.Mesh(
    new THREE.PlaneGeometry(length, CONFIG.roadHalfWidth * 2 + 0.5),
    new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 })
  );
  roadDark.rotation.x = -Math.PI / 2;
  roadDark.position.set(midX, 0.005, 0);
  worldGroup.add(roadDark);

  // ---- Tunnel ribs / arch frames (every ribSpacing) ----
  const ribSpacing = CONFIG.tunnelRibSpacing;
  for (let x = -length / 2 + ribSpacing / 2; x < length / 2; x += ribSpacing) {
    // Left pillar
    const pillar = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, height, 0.25),
      ribMat
    );
    pillar.position.set(x, height / 2, -tunnelHalfW + 0.2);
    pillar.castShadow = true;
    worldGroup.add(pillar);

    // Right pillar
    const pillarR = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, height, 0.25),
      ribMat
    );
    pillarR.position.set(x, height / 2, tunnelHalfW - 0.2);
    pillarR.castShadow = true;
    worldGroup.add(pillarR);
  }

  // ---- Tunnel lights ---- (removed — ceiling is open)

  // ---- Emergency exits & signs (periodically on walls) ----
  for (let x = -length / 2 + 15; x < length / 2 - 15; x += 40) {
    for (const side of [-1, 1]) {
      // Emergency sign (green glowing panel)
      const sign = new THREE.Mesh(
        new THREE.PlaneGeometry(0.6, 0.4),
        emergencyMat
      );
      sign.position.set(x, 2.8, side * (tunnelHalfW + 0.02));
      worldGroup.add(sign);

      // Small "exit" box below
      const exitBox = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 1.0, 0.1),
        new THREE.MeshStandardMaterial({ color: 0x00aa33, roughness: 0.5 })
      );
      exitBox.position.set(x, 1.2, side * (tunnelHalfW + 0.05));
      worldGroup.add(exitBox);
    }
  }

  // ---- Tunnel extensions — detailed walls extending beyond active area ----
  const extLength = 2000;
  for (const side of [-1, 1]) {
    // Extended road base
    const extRoadBase = new THREE.Mesh(
      new THREE.PlaneGeometry(extLength, CONFIG.roadHalfWidth * 2 + 3),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.95 })
    );
    extRoadBase.rotation.x = -Math.PI / 2;
    extRoadBase.position.set(side * (length / 2 + extLength / 2), -0.04, 0);
    extRoadBase.receiveShadow = true;
    worldGroup.add(extRoadBase);
    // Extended side walls with details
    for (const wSide of [-1, 1]) {
      const extWall = new THREE.Mesh(new THREE.BoxGeometry(extLength, height, wallThick), wallMat);
      extWall.position.set(side * (length / 2 + extLength / 2), height / 2, wSide * tunnelHalfW);
      extWall.castShadow = true;
      extWall.receiveShadow = true;
      worldGroup.add(extWall);
      // Base strip
      const extBase = new THREE.Mesh(
        new THREE.BoxGeometry(extLength, 0.6, wallThick + 0.02),
        baseMat
      );
      extBase.position.set(side * (length / 2 + extLength / 2), 0.3, wSide * tunnelHalfW);
      worldGroup.add(extBase);
      // Horizontal stripes every 8m (depth reference)
      const extStart = side > 0 ? length / 2 : -(length / 2 + extLength);
      const extEnd = side > 0 ? length / 2 + extLength : -length / 2;
      for (let x = extStart + 2; x < extEnd - 2; x += 8) {
        for (const h of [1.5, 3.0]) {
          const stripe = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.08, 0.05),
            stripeMat
          );
          stripe.position.set(x, h, wSide * (tunnelHalfW + 0.01));
          worldGroup.add(stripe);
        }
      }
    }
  }

  console.log('🏗️  Open-top tunnel built: length=' + length + 'm, height=' + height + 'm');
}

// ============================================================
//  CAR MODEL
// ============================================================
function createCarModel(color) {
  const group = new THREE.Group();
  const taillightMats = [];

  // Body
  const bodyGeo = new THREE.BoxGeometry(CONFIG.carWidth, CONFIG.carBodyHeight, CONFIG.carLength);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.3,
    metalness: 0.6,
    emissive: new THREE.Color(color).multiplyScalar(0.08),
    emissiveIntensity: 0.15,
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = CONFIG.carBodyHeight / 2 + 0.1;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Cabin
  const cabinW = CONFIG.carWidth * 0.72;
  const cabinL = CONFIG.carLength * 0.58;
  const cabinH = CONFIG.carCabinHeight;
  const cabMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color).multiplyScalar(0.7),
    roughness: 0.2,
    metalness: 0.1,
  });
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(cabinW, cabinH, cabinL), cabMat);
  cabin.position.set(0, CONFIG.carBodyHeight + cabinH / 2 + 0.05, -CONFIG.carLength * 0.08);
  cabin.castShadow = true;
  group.add(cabin);

  // Windshield
  const wsMat = new THREE.MeshStandardMaterial({
    color: 0x88ccff,
    roughness: 0.1,
    metalness: 0.0,
    transparent: true,
    opacity: 0.4,
  });
  const wsGeo = new THREE.PlaneGeometry(cabinW * 0.85, cabinH * 0.85);
  const wsFront = new THREE.Mesh(wsGeo, wsMat);
  wsFront.position.set(0, CONFIG.carBodyHeight + cabinH / 2 + 0.05, -CONFIG.carLength * 0.08 + cabinL / 2 + 0.01);
  group.add(wsFront);

  const wsRear = new THREE.Mesh(wsGeo.clone(), wsMat);
  wsRear.position.set(0, CONFIG.carBodyHeight + cabinH / 2 + 0.05, -CONFIG.carLength * 0.08 - cabinL / 2 - 0.01);
  wsRear.rotation.y = Math.PI;
  group.add(wsRear);

  // Wheels
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  const wheelGeo = new THREE.CylinderGeometry(CONFIG.wheelRadius, CONFIG.wheelRadius, CONFIG.wheelWidth, 8);
  const wheelPositions = [
    [-CONFIG.carWidth / 2 - 0.05, CONFIG.wheelRadius + 0.05, -CONFIG.carLength * 0.3],
    [CONFIG.carWidth / 2 + 0.05, CONFIG.wheelRadius + 0.05, -CONFIG.carLength * 0.3],
    [-CONFIG.carWidth / 2 - 0.05, CONFIG.wheelRadius + 0.05, CONFIG.carLength * 0.3],
    [CONFIG.carWidth / 2 + 0.05, CONFIG.wheelRadius + 0.05, CONFIG.carLength * 0.3],
  ];
  for (const wp of wheelPositions) {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(wp[0], wp[1], wp[2]);
    wheel.rotation.x = Math.PI / 2;
    wheel.castShadow = true;
    group.add(wheel);
  }

  // Headlights with stronger glow for tunnel
  const hlMat = new THREE.MeshStandardMaterial({
    color: 0xffffcc,
    emissive: 0xffffcc,
    emissiveIntensity: 0.5,
  });
  const hlGeo = new THREE.BoxGeometry(0.15, 0.1, 0.05);
  for (const side of [-1, 1]) {
    const hl = new THREE.Mesh(hlGeo, hlMat);
    hl.position.set(side * CONFIG.carWidth * 0.35, CONFIG.carBodyHeight * 0.6, CONFIG.carLength / 2 + 0.03);
    group.add(hl);
  }

  // Headlight glow (emissive standard material, no transparency)
  const glowGeo = new THREE.BoxGeometry(0.55, 0.25, 1.2);
  const glowMat = new THREE.MeshStandardMaterial({
    color: 0xffffcc,
    emissive: 0xffffcc,
    emissiveIntensity: 0.3,
    roughness: 0.5,
    metalness: 0.0,
  });
  for (const side of [-0.35, 0.35]) {
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(side * CONFIG.carWidth, CONFIG.carBodyHeight * 0.35, CONFIG.carLength / 2 + 0.65);
    group.add(glow);
  }

  // Taillights (red) — store material refs for dynamic brake-glow
  const tlMat = new THREE.MeshStandardMaterial({
    color: 0xff2200,
    emissive: 0xff2200,
    emissiveIntensity: 0.15,
  });
  const tlGeo = new THREE.BoxGeometry(0.22, 0.12, 0.06);
  for (const side of [-1, 1]) {
    const tl = new THREE.Mesh(tlGeo, tlMat);
    tl.position.set(side * CONFIG.carWidth * 0.35, CONFIG.carBodyHeight * 0.6, -CONFIG.carLength / 2 - 0.03);
    group.add(tl);
    taillightMats.push(tlMat);
  }

  return { group, taillightMats };
}

// ============================================================
//  PLAYER CAR
// ============================================================
function createPlayerCar() {
  const lane = laneDefs[0]; // start in left lane
  const { group: mesh, taillightMats } = createCarModel(CONFIG.playerColor);

  const car = {
    id: carIdCounter++,
    mesh: mesh,
    lane: lane,
    progress: 50,
    speed: 0,
    targetSpeed: CONFIG.playerMaxSpeed,
    length: CONFIG.carLength,
    width: CONFIG.carWidth,
    color: CONFIG.playerColor,
    prevSpeed: 0,
    brakeIntensity: 0,
    taillightMats: taillightMats,
    isPlayer: true,
    laneChangeTimer: 0,
  };

  const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(car.progress));
  pos.y = 0.1;
  mesh.position.copy(pos);

  const forward = new THREE.Vector3(0, 0, 1);
  mesh.quaternion.setFromUnitVectors(forward, lane.dirVec);

  // Add a glowing ring above the player car for visibility
  const ringGeo = new THREE.TorusGeometry(1.2, 0.08, 8, 16);
  const ringMat = new THREE.MeshStandardMaterial({
    color: 0x00ccff, emissive: 0x00ccff, emissiveIntensity: 0.8, roughness: 0.2
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 1.6;
  ring.userData.isMarker = true;
  mesh.add(ring);

  scene.add(mesh);
  lane.cars.push(car);
  cars.push(car);

  return car;
}

});

  if (k === 'arrowdown') keys.arrowdown = false;
  if (k === 'arrowleft') keys.arrowleft = false;
  if (k === 'arrowright') keys.arrowright = false;
});

function isAccel() { return keys.w || keys.arrowup; }
function isBrake() { return keys.s || keys.arrowdown; }
function isLeft()  { return keys.a || keys.arrowleft; }
function isRight() { return keys.d || keys.arrowright; }

// Reverse travel direction
function reverseDirection() {
  if (gameOver) return;

  for (const lane of laneDefs) {
    // Flip direction
    lane.dir[0] *= -1;
    lane.dirVec.multiplyScalar(-1);
    // Swap start/end
    [lane.start, lane.end] = [lane.end, lane.start];
  }

  // Mirror all car progress
  for (const car of cars) {
    car.progress = car.lane.length - car.progress;
    const pos = car.lane.start.clone().add(car.lane.dirVec.clone().multiplyScalar(car.progress));
    pos.y = 0.1;
    car.mesh.position.copy(pos);
    const forward = new THREE.Vector3(0, 0, 1);
    car.mesh.quaternion.setFromUnitVectors(forward, car.lane.dirVec);
  }

  // Update score tracking
  if (playerCar) lastProgress = playerCar.progress;
}

document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'r' && !e.repeat) {
    reverseDirection();
    e.preventDefault();
  }
});

// ============================================================
//  CAR SPAWNING & MANAGEMENT
// ============================================================
let spawnTimer = 0;

function spawnCar() {
  const lane = laneDefs[Math.floor(Math.random() * laneDefs.length)];

  const color = CONFIG.carColors[Math.floor(Math.random() * CONFIG.carColors.length)];
  const { group: mesh, taillightMats } = createCarModel(color);

  const targetSpeed = CONFIG.carMinSpeed + Math.random() * (CONFIG.carMaxSpeed - CONFIG.carMinSpeed);

  // Start slightly past 0 with randomness to avoid collisions at spawn
  const startProgress = 1 + Math.random() * 8;

  const car = {
    id: carIdCounter++,
    mesh: mesh,
    lane: lane,
    progress: startProgress,
    speed: targetSpeed * 0.3,
    targetSpeed: targetSpeed,
    length: CONFIG.carLength,
    width: CONFIG.carWidth,
    color: color,
    stopped: false,
    prevSpeed: 0,
    brakeIntensity: 0,
    taillightMats: taillightMats,
    shockwaveIntensity: 0,
    shockwaveTimer: 0,
    slowdownTimer: 0,
    stuckTimer: 0,
  };

  // Check if spawn position is clear (accounting for wrap-around)
  let blocked = false;
  for (const other of cars) {
    if (other.lane !== lane) continue;
    // Direct distance on the lane
    let dist = Math.abs(other.progress - startProgress);
    // Also check across the wrap boundary
    if (dist > lane.length * 0.5) dist = lane.length - dist;
    if (dist < car.length * 2.5) {
      blocked = true;
      break;
    }
  }
  if (blocked) {
    // Dispose the mesh we just created to avoid memory leak
    mesh.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => m.dispose());
        } else {
          child.material.dispose();
        }
      }
    });
    return null;
  }

  const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(startProgress));
  pos.y = 0.1;
  mesh.position.copy(pos);

  const forward = new THREE.Vector3(0, 0, 1);
  mesh.quaternion.setFromUnitVectors(forward, lane.dirVec);

  scene.add(mesh);
  lane.cars.push(car);
  cars.push(car);

  return car;
}

function removeCar(car) {
  scene.remove(car.mesh);
  const idx = cars.indexOf(car);
  if (idx !== -1) cars.splice(idx, 1);
  const lIdx = car.lane.cars.indexOf(car);
  if (lIdx !== -1) car.lane.cars.splice(lIdx, 1);
}

function getCarBehind(car) {
  const lane = car.lane;
  const sorted = [...lane.cars].sort((a, b) => b.progress - a.progress);
  const idx = sorted.indexOf(car);
  if (idx >= 0 && idx < sorted.length - 1) {
    const behind = sorted[idx + 1];
    // Don't propagate across the wrap boundary
    if (car.progress - behind.progress < lane.length * 0.5) return behind;
  }
  return null;
}

// ============================================================
//  CAR PHYSICS UPDATE
// ============================================================
function updatePlayer(dt) {
  if (!playerCar || gameOver) return;

  // Lane switching (with cooldown)
  if (playerCar.laneChangeTimer > 0) {
    playerCar.laneChangeTimer -= dt;
  } else {
    // Determine which lane is "left" relative to the car's facing direction
    const leftVec = new THREE.Vector3().crossVectors(
      playerCar.lane.dirVec, new THREE.Vector3(0, 1, 0)
    ).multiplyScalar(-1).normalize();
    // Lane with higher Z component is the "leftwards" lane (from camera view)
    const leftIsHighZ = leftVec.z > 0;
    const leftLane = leftIsHighZ ? laneDefs[1] : laneDefs[0];
    const rightLane = leftIsHighZ ? laneDefs[0] : laneDefs[1];

    if (isLeft() && playerCar.lane !== leftLane) {
      playerCar.lane = leftLane;
      playerCar.laneChangeTimer = 0.3;
    } else if (isRight() && playerCar.lane !== rightLane) {
      playerCar.lane = rightLane;
      playerCar.laneChangeTimer = 0.3;
    }
  }

  // Acceleration / braking
  if (isAccel()) {
    playerCar.speed += CONFIG.playerAccel * dt;
  } else if (isBrake()) {
    playerCar.speed = Math.max(playerCar.speed - CONFIG.playerBrake * dt, 0);
  } else {
    // Gentle natural deceleration (engine braking)
    playerCar.speed = Math.max(playerCar.speed - 2 * dt, 0);
  }

  // Speed warnings — under-speed glow & overspeed penalty
  const mph = playerCar.speed * 2.237;
  const ring = playerCar.mesh.children.find(c => c.userData.isMarker);
  if (ring) {
    if (mph < CONFIG.minSafeSpeed) {
      ring.material.color.setHex(0xff4444);
      ring.material.emissive.setHex(0xff4444);
      ring.material.emissiveIntensity = 0.6 + Math.sin(performance.now() * 0.01) * 0.4;
    } else if (mph > 70) {
      ring.material.color.setHex(0xff8800);
      ring.material.emissive.setHex(0xff8800);
      ring.material.emissiveIntensity = 0.5 + Math.sin(performance.now() * 0.01) * 0.3;
    } else {
      ring.material.color.setHex(0x00ccff);
      ring.material.emissive.setHex(0x00ccff);
      ring.material.emissiveIntensity = 0.5;
    }
  }

  // Overspeed penalty — deduct points when exceeding 70 mph
  const OVERSPEED_LIMIT = 70;
  if (mph > OVERSPEED_LIMIT) {
    score = Math.max(0, score - (mph - OVERSPEED_LIMIT) * dt * 0.5);
  }

  // Brake lights
  const rawBrake = (playerCar.prevSpeed - playerCar.speed) / (CONFIG.playerBrake * dt + 0.001);
  playerCar.brakeIntensity = Math.max(0, Math.min(rawBrake, 1));
  for (const mat of playerCar.taillightMats) {
    mat.emissiveIntensity = 0.12 + playerCar.brakeIntensity * 3.2;
    mat.color.setHex(playerCar.brakeIntensity > 0.2 ? 0xff3300 : 0xcc1100);
  }
  playerCar.prevSpeed = playerCar.speed;

  // Update position
  playerCar.progress += playerCar.speed * dt;
  if (playerCar.progress >= playerCar.lane.length) {
    playerCar.progress -= playerCar.lane.length;
  }

  // Score = distance traveled
  const progressDelta = playerCar.progress - lastProgress;
  if (progressDelta > 0) {
    score += progressDelta;
  } else if (progressDelta < -playerCar.lane.length * 0.5) {
    // Wrapped around
    score += (playerCar.lane.length - lastProgress) + playerCar.progress;
  }
  lastProgress = playerCar.progress;

  // Update mesh position (smooth lane transition)
  const targetPos = playerCar.lane.start.clone()
    .add(playerCar.lane.dirVec.clone().multiplyScalar(playerCar.progress));
  targetPos.y = 0.1;
  playerCar.mesh.position.lerp(targetPos, 0.25);

  const forward = new THREE.Vector3(0, 0, 1);
  const targetQuat = new THREE.Quaternion().setFromUnitVectors(forward, playerCar.lane.dirVec);
  playerCar.mesh.quaternion.slerp(targetQuat, 0.2);

  // Check collisions with AI cars
  for (const other of cars) {
    if (other === playerCar || other.isPlayer) continue;
    if (other.lane !== playerCar.lane) continue;
    const gap = playerCar.progress - other.progress;
    const absGap = Math.abs(gap);
    const wrapGap = playerCar.lane.length - absGap;
    const minGap = Math.min(absGap, wrapGap);
    if (minGap < (playerCar.length + other.length) * 0.45) {
      triggerGameOver();
      return;
    }
  }

  // Update UI
  document.getElementById('mph-display').textContent = Math.round(mph);
  const mphEl = document.getElementById('mph-display');
  const isOverspeed = mph > 70;
  mphEl.className = 'mph' + (isOverspeed ? ' overspeed' : mph < CONFIG.minSafeSpeed ? ' warn' : '');
  document.getElementById('overspeed-label').classList.toggle('active', isOverspeed);
  document.getElementById('score').textContent = Math.round(score);
  document.getElementById('lane-dot-0').classList.toggle('active', playerCar.lane === laneDefs[0]);
  document.getElementById('lane-dot-1').classList.toggle('active', playerCar.lane === laneDefs[1]);
}

function triggerGameOver() {
  gameOver = true;
  document.getElementById('game-over').classList.add('active');
  document.getElementById('final-score').textContent = Math.round(score);

  // Flash all cars red briefly
  for (const c of cars) {
    c.mesh.children.forEach(child => {
      if (child.isMesh && child.material && child.material.emissive) {
        child.material.emissive = new THREE.Color(0xff0000);
        child.material.emissiveIntensity = 0.8;
      }
    });
  }
}

function restartGame() {
  // Remove all cars
  for (let i = cars.length - 1; i >= 0; i--) {
    scene.remove(cars[i].mesh);
  }
  for (const lane of laneDefs) lane.cars.length = 0;
  cars.length = 0;
  carIdCounter = 0;

  // Reset state
  gameOver = false;
  score = 0;
  lastProgress = 0;
  spawnTimer = 0;

  // Reset view
  if (viewMode === 'fpv') toggleView();

  // Hide game over
  document.getElementById('game-over').classList.remove('active');
  document.getElementById('mph-display').textContent = '0';
  document.getElementById('mph-display').className = 'mph';
  document.getElementById('overspeed-label').classList.remove('active');
  document.getElementById('score').textContent = '0';

  // Create player and initial traffic
  playerCar = createPlayerCar();
  lastProgress = playerCar.progress;
  spawnInitialCars(20);

  // Snap camera to player
  if (viewMode === 'top') {
    const startPos = playerCar.mesh.position.clone();
    const startDir = playerCar.lane.dirVec.clone();
    const camStart = startPos.clone()
      .add(startDir.clone().multiplyScalar(-chaseDistance))
      .add(new THREE.Vector3(0, chaseDistance * 0.7, 0));
    camera.position.copy(camStart);
    camera.lookAt(startPos);
  }
}

function updateCars(dt, simSpeed) {
  const adjustedDt = dt * simSpeed;

  for (const lane of laneDefs) {
    lane.cars.sort((a, b) => b.progress - a.progress);
  }

  for (let i = cars.length - 1; i >= 0; i--) {
    const car = cars[i];
    if (car.isPlayer) continue; // skip player — handled by updatePlayer
    const lane = car.lane;

    let desired = car.targetSpeed;

    // 1. Random slowdown event (originates a braking shockwave)
    if (car.slowdownTimer > 0) {
      car.slowdownTimer -= adjustedDt;
      const factor = Math.min(car.slowdownTimer / CONFIG.slowdownDuration, 1);
      desired = Math.min(desired, car.targetSpeed * (0.2 + 0.5 * factor));
      if (car.slowdownTimer <= 0) {
        car.slowdownTimer = 0;
      }
    } else if (Math.random() < CONFIG.slowdownChance) {
      car.slowdownTimer = CONFIG.slowdownDuration + Math.random() * 1.0;
      if (car.shockwaveIntensity < 0.01) {
        car.shockwaveIntensity = 0.6 + Math.random() * 0.4;
        car.shockwaveTimer = 0.08;
      }
    }

    // 2. Car ahead – closing-speed based following
    const laneCars = lane.cars;
    const myIndex = laneCars.indexOf(car);
    if (myIndex > 0) {
      const ahead = laneCars[myIndex - 1];
      // Skip wrap-boundary pairs (gap > half the lane = not really adjacent)
      const rawGap = ahead.progress - car.progress;
      if (rawGap < lane.length * 0.5) {
        const dist = (ahead.progress - ahead.length / 2) - (car.progress + car.length / 2);
        const minGap = 2.0;
        const closingSpeed = Math.max(car.speed - ahead.speed, 0);

        if (dist < minGap * 0.6) {
          desired = Math.min(desired, Math.max(ahead.speed * 0.5, 0));
        }
        else if (closingSpeed > 0.3 && dist < minGap + closingSpeed * 3.0) {
          const availableDist = Math.max(dist - minGap, 0.01);
          const needed = (closingSpeed * closingSpeed) / (2 * CONFIG.carBrake) + 0.3;
          if (needed > availableDist * 1.15) {
            desired = Math.min(desired, Math.max(ahead.speed * 0.7, 0));
          } else {
            const safeClosing = Math.sqrt(2 * CONFIG.carBrake * availableDist);
            desired = Math.min(desired, ahead.speed + safeClosing);
          }
        }
      }
    }

    // 3. Shockwave propagation
    if (car.shockwaveIntensity > 0.01) {
      const brakeFactor = 1 - car.shockwaveIntensity * 0.55;
      desired = Math.min(desired, Math.max(car.speed * brakeFactor, 0));
      if (car.speed < 0.3) desired = 0;

      car.shockwaveTimer -= adjustedDt;
      if (car.shockwaveTimer <= 0) {
        const behind = getCarBehind(car);
        if (behind && behind.shockwaveIntensity < 0.05) {
          behind.shockwaveIntensity = car.shockwaveIntensity * 0.82;
          behind.shockwaveTimer = 0.25 + Math.random() * 0.18;
        }
        car.shockwaveIntensity = 0;
      }
    }

    // Detect hard deceleration to ORIGINATE a shockwave
    const decel = (car.prevSpeed - car.speed) / Math.max(adjustedDt, 0.001);
    if (decel > 5 && desired < car.speed * 0.7 && car.shockwaveIntensity < 0.01) {
      car.shockwaveIntensity = Math.min(decel / 12, 1.2);
      car.shockwaveTimer = 0.12;
    }

    // 5. Deadlock breaker — if crawling >4 s, force‑accelerate
    if (car.speed < 0.5) {
      car.stuckTimer += adjustedDt;
      if (car.stuckTimer > 4.0) {
        desired = car.targetSpeed;
        car.shockwaveIntensity = 0;
        car.slowdownTimer = 0;
        car.stuckTimer = 0;
      }
    } else {
      car.stuckTimer = Math.max(0, car.stuckTimer - adjustedDt * 0.5);
    }

    // Accelerate / Brake
    if (desired < car.speed) {
      car.speed = Math.max(car.speed - CONFIG.carBrake * adjustedDt, desired);
    } else if (desired > car.speed) {
      car.speed = Math.min(car.speed + CONFIG.carAccel * adjustedDt, desired);
    }
    car.speed = Math.max(0, car.speed);

    // Brake intensity for taillight glow
    const rawBrake = (car.prevSpeed - car.speed) / (CONFIG.carBrake * adjustedDt + 0.001);
    car.brakeIntensity = Math.max(0, Math.min(rawBrake, 1));
    if (car.shockwaveIntensity > 0.01) {
      car.brakeIntensity = Math.max(car.brakeIntensity, car.shockwaveIntensity * 0.7);
    }
    for (const mat of car.taillightMats) {
      mat.emissiveIntensity = 0.12 + car.brakeIntensity * 3.2;
      mat.color.setHex(car.brakeIntensity > 0.2 ? 0xff3300 : 0xcc1100);
    }
    car.prevSpeed = car.speed;

    // Update position
    car.progress += car.speed * adjustedDt;

    // ★ NEVER-ENDING LOOP — wrap around instead of removing
    if (car.progress >= lane.length) {
      car.progress -= lane.length;
      // Skip past the spawn zone so wrapping cars don't block new spawns
      const spawnZoneEnd = 18;
      if (car.progress < spawnZoneEnd) {
        car.progress = spawnZoneEnd + Math.random() * 8;
      }
    }

    // Update mesh
    const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(car.progress));
    pos.y = 0.1;
    car.mesh.position.copy(pos);

    const forward = new THREE.Vector3(0, 0, 1);
    const targetQuat = new THREE.Quaternion().setFromUnitVectors(forward, lane.dirVec);
    car.mesh.quaternion.slerp(targetQuat, 0.15);
  }
}

// ============================================================
//  COLLISION DETECTION & RESOLUTION
// ============================================================
function resolveCollisions() {
  // Same-lane rear-end prevention (AI cars only — player handled separately)
  for (const lane of laneDefs) {
    const sorted = [...lane.cars].filter(c => !c.isPlayer).sort((a, b) => a.progress - b.progress);
    for (let j = 1; j < sorted.length; j++) {
      const lead = sorted[j];
      const follow = sorted[j - 1];
      const gap = (lead.progress - lead.length / 2) - (follow.progress + follow.length / 2);
      const minSpace = 1.0;
      if (gap < minSpace) {
        const push = Math.max((minSpace - gap) / 2, 0.01);
        lead.progress = Math.min(lead.progress + push, lead.lane.length - 0.1);
        follow.progress = Math.max(follow.progress - push, 0);
      }
    }
  }

  // Sync AI mesh positions (skip player)
  for (const car of cars) {
    if (car.isPlayer) continue;
    const pos = car.lane.start.clone()
      .add(car.lane.dirVec.clone().multiplyScalar(car.progress));
    pos.y = 0.1;
    car.mesh.position.copy(pos);
  }
}

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//  ANIMATION LOOP
// ============================================================
let lastTime = 0;

function animate(time) {
  if (gameOver) {
    // Still render but pause updates
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
    return;
  }

  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Spawn AI cars
  spawnTimer += dt;
  const spawnInterval = CONFIG.spawnIntervalBase;
  if (spawnTimer >= spawnInterval && cars.length < 80) {
    spawnTimer = 0;
    for (let a = 0; a < 3; a++) {
      if (spawnCar() !== null) break;
    }
  }

  // Update player
  updatePlayer(dt);
  if (gameOver) {
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
    return;
  }

  // Update AI cars
  updateCars(dt, 1.0);
  resolveCollisions();

  // Camera
  if (playerCar) {
    if (viewMode === 'fpv') {
      // First-person view behind the player car
      const pos = playerCar.mesh.position.clone();
      const dir = playerCar.lane.dirVec.clone();
      // Position camera behind and above the car
      const camPos = pos.clone()
        .add(dir.clone().multiplyScalar(-8))  // 8m behind
        .add(new THREE.Vector3(0, 4, 0));     // 4m above
      camera.position.lerp(camPos, 0.15);
      // Look at a point ahead of the car
      const lookTarget = pos.clone()
        .add(dir.clone().multiplyScalar(30))
        .add(new THREE.Vector3(0, 1.5, 0));
      camera.lookAt(lookTarget);
    } else {
      // Top-down chase cam — follow behind and above the player
      const pos = playerCar.mesh.position.clone();
      const dir = playerCar.lane.dirVec.clone();
      const idealPos = pos.clone()
        .add(dir.clone().multiplyScalar(-chaseDistance))
        .add(new THREE.Vector3(0, chaseDistance * 0.7, 0));
      camera.position.lerp(idealPos, 0.15);
      camera.lookAt(pos);
    }
  }

  document.getElementById('car-count').textContent = cars.length;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// ============================================================
//  INIT
// ============================================================

function spawnInitialCars(count) {
  for (let i = 0; i < count; i++) {
    const lane = laneDefs[Math.floor(Math.random() * laneDefs.length)];
    const color = CONFIG.carColors[Math.floor(Math.random() * CONFIG.carColors.length)];
    const { group: mesh, taillightMats } = createCarModel(color);
    const targetSpeed = CONFIG.carMinSpeed + Math.random() * (CONFIG.carMaxSpeed - CONFIG.carMinSpeed);

    // Random starting position spread across the lane
    const startProgress = 10 + Math.random() * (lane.length * 0.85);

    const car = {
      id: carIdCounter++,
      mesh: mesh,
      lane: lane,
      progress: startProgress,
      speed: targetSpeed * (0.3 + Math.random() * 0.7),
      targetSpeed: targetSpeed,
      length: CONFIG.carLength,
      width: CONFIG.carWidth,
      color: color,
      stopped: false,
      prevSpeed: targetSpeed * 0.5,
      brakeIntensity: 0,
      taillightMats: taillightMats,
      shockwaveIntensity: 0,
      shockwaveTimer: 0,
      slowdownTimer: 0,
      stuckTimer: 0,
    };

    const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(startProgress));
    pos.y = 0.1;
    mesh.position.copy(pos);

    const forward = new THREE.Vector3(0, 0, 1);
    mesh.quaternion.setFromUnitVectors(forward, lane.dirVec);

    scene.add(mesh);
    lane.cars.push(car);
    cars.push(car);
  }
}

// ---- Start game ----
playerCar = createPlayerCar();
lastProgress = playerCar.progress;
spawnInitialCars(20);

// Snap camera to player immediately (chase cam position)
const startPos = playerCar.mesh.position.clone();
const startDir = playerCar.lane.dirVec.clone();
const camStart = startPos.clone()
  .add(startDir.clone().multiplyScalar(-chaseDistance))
  .add(new THREE.Vector3(0, chaseDistance * 0.7, 0));
camera.position.copy(camStart);
camera.lookAt(startPos);

// Restart button
document.getElementById('btn-restart').addEventListener('click', restartGame);
document.getElementById('btn-reset').addEventListener('click', restartGame);

animate(0);

console.log('🏎️ Tunnel Runner ready!');
console.log(`🚗 Player car #${playerCar.id}, ${cars.length} total cars, ${laneDefs.length} lanes`);
</script>
