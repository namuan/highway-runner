<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Scenic Route</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: #050508;
    overflow: hidden;
    color: #e0e0e0;
    user-select: none;
  }

  canvas { display: block; }

  /* --- UI Overlay --- */
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #ui > * { pointer-events: auto; }

  /* Top bar: title + stats */
  #top-bar {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 28px;
    font-size: 13px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  #top-bar .title {
    font-weight: 700;
    font-size: 15px;
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #top-bar .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #aaa;
  }

  #top-bar .stat .value {
    color: #fff;
    font-weight: 600;
    min-width: 28px;
  }

  /* Bottom controls panel */
  #controls {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 32px;
    font-size: 13px;
  }

  #controls .group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #controls label {
    color: #999;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  #controls input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 4px;
    border-radius: 2px;
    background: #333;
    outline: none;
  }

  #controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: 0.15s;
  }
  #controls input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  #controls input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    cursor: pointer;
    border: none;
  }

  #controls .value-display {
    color: #fff;
    font-weight: 600;
    min-width: 32px;
    text-align: center;
    font-size: 13px;
  }

  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: 0.2s;
  }
  .btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .btn:active { transform: scale(0.96); }

  /* --- Speed gauge --- */
  #speed-gauge {
    position: fixed;
    bottom: 120px; right: 24px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px 20px;
    text-align: center;
    min-width: 100px;
  }
  #speed-gauge .mph {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -2px;
    color: #fff;
    line-height: 1;
  }
  #speed-gauge .mph.warn { color: #ff9944; }
  #speed-gauge .mph.danger { color: #ff3333; }
  #speed-gauge .mph.overspeed { color: #ff4400; text-shadow: 0 0 20px rgba(255,68,0,0.6); }
  #speed-gauge .overspeed-label {
    display: none;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ff4400;
    margin-top: 2px;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  #speed-gauge .overspeed-label.active { display: block; }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  #speed-gauge .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #888;
    margin-top: 4px;
  }

  /* --- Game Over overlay --- */
  #game-over {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(3px);
    display: none;
    justify-content: flex-end;
    align-items: center;
    z-index: 100;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 60px;
    pointer-events: none;
  }
  #game-over.active { display: flex; }
  #game-over h2 {
    font-size: 36px;
    font-weight: 800;
    color: #ff4444;
    letter-spacing: -1px;
    text-shadow: 0 0 20px rgba(255,0,0,0.5);
    margin: 0;
  }
  #game-over .final-score {
    font-size: 18px;
    color: #ccc;
  }
  #game-over .final-score span {
    color: #ffcc00;
    font-weight: 700;
  }
  #game-over .btn {
    font-size: 14px;
    padding: 10px 28px;
    pointer-events: auto;
    margin-top: 8px;
  }

  /* --- Speed lines overlay --- */
  #speed-lines {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 5; opacity: 0;
    transition: opacity 0.3s;
    overflow: hidden;
  }
  #speed-lines.active { opacity: 1; }
  #speed-lines .line {
    position: absolute; top: 0; height: 100%; width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
    animation: speedStreak linear infinite;
  }
  @keyframes speedStreak {
    from { transform: translateY(-100%); }
    to { transform: translateY(100vh); }
  }

  /* --- Wrap checkpoint flash --- */
  #checkpoint-flash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 6;
    background: radial-gradient(ellipse at center, rgba(0,200,255,0.15) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.15s;
  }

  /* --- Lane indicator --- */
  #lane-indicator {
    position: fixed;
    bottom: 120px; left: 24px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 8px 14px;
    display: flex;
    gap: 6px;
  }
  #lane-indicator .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.2s;
  }
  #lane-indicator .dot.active { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

  .btn-primary {
    background: linear-gradient(135deg, #ff9944, #ffcc00);
    border: none;
    color: #000;
  }
  .btn-primary:hover {
    opacity: 0.9;
    color: #000;
  }

  /* Responsive */
  @media (max-width: 820px) {
    #top-bar { font-size: 11px; padding: 8px 14px; gap: 14px; flex-wrap: wrap; justify-content: center; }
    #controls { flex-wrap: wrap; justify-content: center; gap: 14px; padding: 12px 16px; max-width: 95vw; }
    #controls input[type="range"] { width: 72px; }
  }

  @media (max-width: 480px) {
    #controls .group { gap: 6px; }
    #controls input[type="range"] { width: 56px; }
  }
</style>
</head>
<body>

<div id="ui">
  <!-- Top bar -->
  <div id="top-bar">
    <span class="title">🏎️ Scenic Route</span>
    <span class="stat">📏 <span class="value" id="score">0</span>m</span>
    <span class="stat">🚗 <span class="value" id="car-count">0</span></span>
  </div>

  <!-- Speed gauge -->
  <div id="speed-gauge">
    <div class="mph" id="mph-display">0</div>
    <div class="label">mph</div>
    <div class="overspeed-label" id="overspeed-label">⚠ OVERSPEED</div>
  </div>

  <!-- Speed lines overlay -->
  <div id="speed-lines"></div>
  <!-- Checkpoint flash -->
  <div id="checkpoint-flash"></div>

  <!-- Lane indicator -->
  <div id="lane-indicator">
    <div class="dot" id="lane-dot-0"></div>
    <div class="dot" id="lane-dot-1"></div>
  </div>

  <!-- Game Over overlay -->
  <div id="game-over">
    <h2>💥 CRASH</h2>
    <div class="final-score">Distance: <span id="final-score">0</span> m</div>
    <button class="btn btn-primary" id="btn-restart">🔄 Play Again</button>
  </div>

  <!-- Bottom controls -->
  <div id="controls">
    <span style="color:#888;font-size:11px">↑ Accel &nbsp; ↓/Space Brake &nbsp; ← → Lane &nbsp; <b>V</b> View &nbsp; <b>R</b> Reverse &nbsp; <b>N</b> Night</span>
    <button class="btn" id="btn-view">🎥 FPV</button>
    <button class="btn" id="btn-time">🌙 Night</button>
    <button class="btn" id="btn-reset">⟳ Reset</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
//  CONFIGURATION
// ============================================================
const CONFIG = {
  roadLength: 6400,
  roadHalfWidth: 3.75,
  laneWidth: 3.5,
  carColors: [
    0xe74c3c, 0x3498db, 0x2ecc71, 0xf1c40f, 0xffffff,
    0x333333, 0x95a5a6, 0xe67e22, 0x9b59b6, 0x1abc9c,
    0xe91e63, 0x795548, 0x00bcd4, 0xff5722,
  ],
  carMinSpeed: 12,
  carMaxSpeed: 22,
  carAccel: 10,
  carBrake: 18,
  carLength: 4.0,
  carWidth: 1.8,
  carBodyHeight: 0.55,
  carCabinHeight: 0.35,
  wheelRadius: 0.25,
  wheelWidth: 0.18,
  spawnIntervalBase: 1.2,
  // Random slowdown events trigger braking shockwaves
  slowdownChance: 0.0004,
  slowdownDuration: 2.5,
  // Player car
  playerColor: 0x00ccff,
  playerAccel: 14,
  playerBrake: 22,
  playerMaxSpeed: 120,
  minSafeSpeed: 10,    // mph threshold before underspeed penalty
  // Tunnel config (unused — open scenery)
};

// ============================================================
//  GLOBALS
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 100, 800);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1200);
camera.position.set(0, 75, 0.01);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.05;
controls.minDistance = 1;
controls.maxDistance = 200;
controls.update();

// World group for tunnel/road geometry (shifted for infinite wrapping)
const worldGroup = new THREE.Group();
scene.add(worldGroup);

// ============================================================
//  OUTDOOR LIGHTING
// ============================================================
// Sky ambient — bright outdoor feel
const ambient = new THREE.AmbientLight(0xaaccff, 0.8);
scene.add(ambient);

// Sun directional light
const sunLight = new THREE.DirectionalLight(0xfff8e7, 2.5);
sunLight.position.set(100, 60, 40);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 300;
sunLight.shadow.camera.left = -100;
sunLight.shadow.camera.right = 100;
sunLight.shadow.camera.top = 100;
sunLight.shadow.camera.bottom = -100;
scene.add(sunLight);

// Sky fill (blue-ish from above)
const skyFill = new THREE.AmbientLight(0x8899cc, 0.4);
scene.add(skyFill);

// Road surface (dark asphalt)
const roadBaseMat = new THREE.MeshStandardMaterial({
  color: 0x555555,
  roughness: 0.9,
  metalness: 0.0,
});
const roadBase = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadLength + 40, 50), roadBaseMat);
roadBase.rotation.x = -Math.PI / 2;
roadBase.position.y = -0.05;
roadBase.receiveShadow = true;
worldGroup.add(roadBase);

// ============================================================
//  ROAD SYSTEM — single 4‑lane tunnel road (X‑axis)
// ============================================================
const laneDefs = [];
const cars = [];
let carIdCounter = 0;

// ============================================================
//  GAME STATE
// ============================================================
let playerCar = null;
let gameOver = false;
let score = 0;
let gameTime = 0;        // elapsed game time (seconds)
let lastProgress = 0;
let viewMode = 'fpv'; // 'top' or 'fpv'
let timeOfDay = 'day';  // 'day' or 'night'
let chaseDistance = 3;
// Keyboard state
const keys = { ' ': false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

const RL = CONFIG.roadHalfWidth;
const LW = CONFIG.laneWidth;

// ============================================================
//  AUDIO SYSTEM — procedural sounds via Web Audio API
// ============================================================
let audioCtx = null;
let engineOsc = null, engineGain = null, engineFilter = null;
let hornTimer = 0;
let fireGroup = null;
let gameOverAngle = 0;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Engine — low growling oscillator
    engineFilter = audioCtx.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 300;
    engineGain = audioCtx.createGain();
    engineGain.gain.value = 0;
    engineOsc = audioCtx.createOscillator();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 40;
    engineOsc.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineGain.connect(audioCtx.destination);
    engineOsc.start();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function updateEngineSound(speed) {
  if (!engineOsc) return;
  const freq = 40 + speed * 5; // 40Hz idle → ~200Hz at top speed
  engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
  const vol = Math.min(0.08 + speed * 0.003, 0.15); // volume scales with speed
  engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
}

function playBrakeSound(intensity) {
  if (!audioCtx) return;
  const dur = 0.1 + intensity * 0.1;
  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.min(1, i / 300) * intensity * 0.6;
  }
  noise.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400 + intensity * 600;
  filter.Q.value = 0.3;
  const gain = audioCtx.createGain();
  gain.gain.value = intensity * 0.08;
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start();
  noise.stop(audioCtx.currentTime + dur);
}

function playCrashSound() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Layered impact — low thud + metallic crunch
  for (let layer = 0; layer < 3; layer++) {
    const dur = 0.15 + layer * 0.1;
    const noise = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = Math.exp(-i / (audioCtx.sampleRate * 0.04));
      data[i] = (Math.random() * 2 - 1) * env;
    }
    noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 150 + layer * 200;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.25 - layer * 0.06, now + layer * 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur + layer * 0.02);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start(now + layer * 0.02);
    noise.stop(now + dur + layer * 0.02);
  }
}

function playHorn() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [0, 0.15].forEach(offset => {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 420;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12, now + offset);
    gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + offset);
    osc.stop(now + offset + 0.12);
  });
}

function buildTunnelRoad() {
  const length = CONFIG.roadLength;
  const halfW = CONFIG.roadHalfWidth;

  // Road surface
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.85, metalness: 0.05 });
  const road = new THREE.Mesh(new THREE.PlaneGeometry(length, halfW * 2), roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, 0, 0);
  road.receiveShadow = true;
  worldGroup.add(road);

  // Lane markings (dashed) - center divider only
  const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.6 });
  const dividerOffsets = [0]; // center line only
  for (const offset of dividerOffsets) {
    for (let seg = 0; seg < 60; seg++) {
      const t = seg / 60;
      const pos = (t - 0.5) * (length - 4);
      const dashLen = 2.0, gapLen = 2.5;
      const cyclePos = ((pos + length / 2) % (dashLen + gapLen));
      if (cyclePos > dashLen) continue;
      const dash = new THREE.Mesh(
        new THREE.PlaneGeometry(dashLen, 0.15),
        lineMat
      );
      dash.rotation.x = -Math.PI / 2;
      dash.position.set(pos, 0.01, offset);
      worldGroup.add(dash);
    }
  }

  // Edge lines (solid)
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  for (const side of [-1, 1]) {
    const edge = new THREE.Mesh(
      new THREE.PlaneGeometry(length, 0.2),
      edgeMat
    );
    edge.rotation.x = -Math.PI / 2;
    edge.position.set(0, 0.015, side * (halfW - 0.15));
    worldGroup.add(edge);
  }

  // Sidewalks / kerbs
  for (const side of [-1, 1]) {
    const sw = new THREE.Mesh(
      new THREE.BoxGeometry(length, 0.15, 0.8),
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 })
    );
    sw.position.set(0, 0.075, side * (halfW + 0.4));
    sw.receiveShadow = true;
    worldGroup.add(sw);
  }

  // Road studs (cats eyes) — small reflective dots along lane lines
  const studMat = new THREE.MeshStandardMaterial({
    color: 0xffffaa,
    emissive: 0xffffaa,
    emissiveIntensity: 0.15,
    roughness: 0.3,
  });
  for (const offset of dividerOffsets) {
    for (let x = -length / 2 + 3; x < length / 2 - 3; x += 4) {
      const stud = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), studMat);
      stud.position.set(x, 0.04, offset);
      worldGroup.add(stud);
    }
  }

  // ----- Lanes -----  (2 eastbound lanes, centered)
  const startX = -length / 2;
  const endX   =  length / 2;

  // Two lanes: z = -1.75 and z = 1.75, both eastbound (+X)
  const laneZs = [-LW/2, LW/2];
  for (let i = 0; i < 2; i++) {
    laneDefs.push({
      id: `lane_w${i}`, road: 'x', dir: [-1,0,0],
      start: new THREE.Vector3(endX,   0, laneZs[i]),
      end:   new THREE.Vector3(startX, 0, laneZs[i]),
    });
  }
}

function finalizeLanes() {
  for (const def of laneDefs) {
    def.dirVec = new THREE.Vector3(def.dir[0], def.dir[1], def.dir[2]);
    def.length = def.start.distanceTo(def.end);
    def.cars = [];
  }
}

buildTunnelRoad();
finalizeLanes();

// ============================================================
//  TUNNEL ENVIRONMENT — full-length enclosed tunnel
// ============================================================
function buildScenicRoute() {
  const length = CONFIG.roadLength;
  const halfW = CONFIG.roadHalfWidth;

  // ---- Guardrails along road edges ----
  const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.4, metalness: 0.6 });
  const railPostsMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.7 });
  const postSpacing = 3;

  for (const side of [-1, 1]) {
    for (let x = -length / 2; x < length / 2; x += postSpacing) {
      // Post
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.9, 0.12), railPostsMat);
      post.position.set(x, 0.45, side * (halfW + 0.7));
      post.castShadow = true;
      worldGroup.add(post);

      // Rail bar
      const railLen = postSpacing;
      const rail = new THREE.Mesh(new THREE.BoxGeometry(railLen, 0.08, 0.1), railMat);
      rail.position.set(x, 0.85, side * (halfW + 0.7));
      worldGroup.add(rail);
    }
  }

  // ---- Trees along both sides ----
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 });
  const foliageColors = [0x2d5a1e, 0x3a7a25, 0x1f4f0f, 0x4a8c2a, 0x226618];
  const treeInterval = 12;

  for (let x = -length / 2; x < length / 2; x += treeInterval) {
    // Offset trees from exact grid for natural look
    const jitterX = (Math.random() - 0.5) * 4;

    for (const side of [-1, 1]) {
      const distFromRoad = 3.5 + Math.random() * 6;
      const z = side * (halfW + distFromRoad);
      const treeH = 1.5 + Math.random() * 3;

      // Trunk
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.2, treeH * 0.5, 6),
        trunkMat
      );
      trunk.position.set(x + jitterX, treeH * 0.25, z);
      trunk.castShadow = true;
      worldGroup.add(trunk);

      // Canopy layers
      for (let layer = 0; layer < 3; layer++) {
        const coneH = treeH * 0.35;
        const coneR = treeH * (0.35 - layer * 0.08);
        const cone = new THREE.Mesh(
          new THREE.ConeGeometry(coneR, coneH, 7),
          new THREE.MeshStandardMaterial({
            color: foliageColors[Math.floor(Math.random() * foliageColors.length)],
            roughness: 0.7,
          })
        );
        cone.position.set(x + jitterX, treeH * 0.45 + layer * coneH * 0.55, z);
        cone.castShadow = true;
        worldGroup.add(cone);
      }
    }
  }

  // ---- Distant mountains ----
  const mountainMatDark = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 });
  const mountainMatSnow = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.7 });
  for (let i = 0; i < 16; i++) {
    const mx = (Math.random() - 0.5) * length;
    const mz = (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 40);
    const mh = 15 + Math.random() * 40;
    const mr = mh * 0.6;
    const mountain = new THREE.Mesh(
      new THREE.ConeGeometry(mr, mh, 8),
      mountainMatDark
    );
    mountain.position.set(mx, -mh * 0.3, mz);
    worldGroup.add(mountain);

    // Snow cap on taller ones
    if (mh > 35) {
      const snow = new THREE.Mesh(
        new THREE.ConeGeometry(mr * 0.3, mh * 0.25, 8),
        mountainMatSnow
      );
      snow.position.set(mx, mh * 0.35, mz);
      worldGroup.add(snow);
    }
  }

  // ---- Small bushes / scrub ----
  const bushMat = new THREE.MeshStandardMaterial({ color: 0x3a6b20, roughness: 0.8 });
  for (let i = 0; i < 80; i++) {
    const bx = (Math.random() - 0.5) * length;
    const bz = (Math.random() > 0.5 ? 1 : -1) * (halfW + 1.5 + Math.random() * 15);
    const bush = new THREE.Mesh(
      new THREE.SphereGeometry(0.3 + Math.random() * 0.5, 5, 4),
      bushMat
    );
    bush.position.set(bx, 0.2, bz);
    bush.scale.y = 0.6;
    worldGroup.add(bush);
  }

  // ---- Plains / ground planes on both sides ----
  const plainMat = new THREE.MeshStandardMaterial({ color: 0x4a7a2e, roughness: 0.9 });
  const plainWidth = 60;
  for (const side of [-1, 1]) {
    const plain = new THREE.Mesh(
      new THREE.PlaneGeometry(length, plainWidth),
      plainMat
    );
    plain.rotation.x = -Math.PI / 2;
    plain.position.set(0, -0.1, side * (halfW + plainWidth / 2 + 1));
    plain.receiveShadow = true;
    worldGroup.add(plain);
  }

  // ---- Mounds / gentle hills ----
  const moundColors = [0x5a8a3a, 0x4a7a2e, 0x6a9a44, 0x3d6b22];
  for (let i = 0; i < 40; i++) {
    const mx = (Math.random() - 0.5) * length;
    const mside = Math.random() > 0.5 ? 1 : -1;
    const mz = mside * (halfW + 5 + Math.random() * 55);
    const mh = 1 + Math.random() * 4;
    const mr = mh * 1.5 + Math.random() * 3;
    const mound = new THREE.Mesh(
      new THREE.SphereGeometry(mr, 12, 8, 0, Math.PI * 2, 0, Math.PI / 3),
      new THREE.MeshStandardMaterial({
        color: moundColors[Math.floor(Math.random() * moundColors.length)],
        roughness: 0.8,
      })
    );
    mound.position.set(mx, -mh * 0.15, mz);
    mound.scale.y = 0.4;
    mound.receiveShadow = true;
    worldGroup.add(mound);
  }

  console.log('🌲 Scenic route built: length=' + length + 'm, trees, guardrails, mountains, plains, mounds');
}

// ============================================================
//  CAR MODEL
// ============================================================
function createCarModel(color) {
  const group = new THREE.Group();
  const taillightMats = [];
  const turnSignalMats = [];

  // Body
  const bodyGeo = new THREE.BoxGeometry(CONFIG.carWidth, CONFIG.carBodyHeight, CONFIG.carLength);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.3,
    metalness: 0.6,
    emissive: new THREE.Color(color).multiplyScalar(0.08),
    emissiveIntensity: 0.15,
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = CONFIG.carBodyHeight / 2 + 0.1;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Cabin
  const cabinW = CONFIG.carWidth * 0.72;
  const cabinL = CONFIG.carLength * 0.58;
  const cabinH = CONFIG.carCabinHeight;
  const cabMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color).multiplyScalar(0.7),
    roughness: 0.2,
    metalness: 0.1,
  });
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(cabinW, cabinH, cabinL), cabMat);
  cabin.position.set(0, CONFIG.carBodyHeight + cabinH / 2 + 0.05, -CONFIG.carLength * 0.08);
  cabin.castShadow = true;
  group.add(cabin);

  // Windshield
  const wsMat = new THREE.MeshStandardMaterial({
    color: 0x88ccff,
    roughness: 0.1,
    metalness: 0.0,
    transparent: true,
    opacity: 0.4,
  });
  const wsGeo = new THREE.PlaneGeometry(cabinW * 0.85, cabinH * 0.85);
  const wsFront = new THREE.Mesh(wsGeo, wsMat);
  wsFront.position.set(0, CONFIG.carBodyHeight + cabinH / 2 + 0.05, -CONFIG.carLength * 0.08 + cabinL / 2 + 0.01);
  group.add(wsFront);

  const wsRear = new THREE.Mesh(wsGeo.clone(), wsMat);
  wsRear.position.set(0, CONFIG.carBodyHeight + cabinH / 2 + 0.05, -CONFIG.carLength * 0.08 - cabinL / 2 - 0.01);
  wsRear.rotation.y = Math.PI;
  group.add(wsRear);

  // Wheels
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  const wheelGeo = new THREE.CylinderGeometry(CONFIG.wheelRadius, CONFIG.wheelRadius, CONFIG.wheelWidth, 8);
  const wheelPositions = [
    [-CONFIG.carWidth / 2 - 0.05, CONFIG.wheelRadius + 0.05, -CONFIG.carLength * 0.3],
    [CONFIG.carWidth / 2 + 0.05, CONFIG.wheelRadius + 0.05, -CONFIG.carLength * 0.3],
    [-CONFIG.carWidth / 2 - 0.05, CONFIG.wheelRadius + 0.05, CONFIG.carLength * 0.3],
    [CONFIG.carWidth / 2 + 0.05, CONFIG.wheelRadius + 0.05, CONFIG.carLength * 0.3],
  ];
  for (const wp of wheelPositions) {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(wp[0], wp[1], wp[2]);
    wheel.rotation.x = Math.PI / 2;
    wheel.castShadow = true;
    group.add(wheel);
  }

  // Headlights with stronger glow for tunnel
  const hlMat = new THREE.MeshStandardMaterial({
    color: 0xffffcc,
    emissive: 0xffffcc,
    emissiveIntensity: 0.5,
  });
  const hlGeo = new THREE.BoxGeometry(0.15, 0.1, 0.05);
  for (const side of [-1, 1]) {
    const hl = new THREE.Mesh(hlGeo, hlMat);
    hl.position.set(side * CONFIG.carWidth * 0.35, CONFIG.carBodyHeight * 0.6, CONFIG.carLength / 2 + 0.03);
    group.add(hl);
  }

  // Headlight glow (emissive standard material, no transparency)
  const glowGeo = new THREE.BoxGeometry(0.55, 0.25, 1.2);
  const glowMat = new THREE.MeshStandardMaterial({
    color: 0xffffcc,
    emissive: 0xffffcc,
    emissiveIntensity: 0.3,
    roughness: 0.5,
    metalness: 0.0,
  });
  for (const side of [-0.35, 0.35]) {
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(side * CONFIG.carWidth, CONFIG.carBodyHeight * 0.35, CONFIG.carLength / 2 + 0.65);
    group.add(glow);
  }

  // Taillights (red) — store material refs for dynamic brake-glow
  const tlMat = new THREE.MeshStandardMaterial({
    color: 0xff2200,
    emissive: 0xff2200,
    emissiveIntensity: 0.15,
  });
  const tlGeo = new THREE.BoxGeometry(0.22, 0.12, 0.06);
  for (const side of [-1, 1]) {
    const tl = new THREE.Mesh(tlGeo, tlMat);
    tl.position.set(side * CONFIG.carWidth * 0.35, CONFIG.carBodyHeight * 0.6, -CONFIG.carLength / 2 - 0.03);
    group.add(tl);
    taillightMats.push(tlMat);
  }

  // Turn signals — amber lights at front corners
  const tsGeo = new THREE.BoxGeometry(0.12, 0.06, 0.04);
  for (const side of [-1, 1]) {
    const tsMat = new THREE.MeshStandardMaterial({
      color: 0xff8800, emissive: 0xff8800, emissiveIntensity: 0.0
    });
    const ts = new THREE.Mesh(tsGeo, tsMat);
    ts.position.set(side * CONFIG.carWidth * 0.45, CONFIG.carBodyHeight * 0.55, CONFIG.carLength / 2);
    group.add(ts);
    turnSignalMats.push(tsMat); // index 0 = left (-1), index 1 = right (+1)
  }

  return { group, taillightMats, turnSignalMats };
}

// ============================================================
function createPlayerCar() {
  const lane = laneDefs[0]; // start in left lane
  const { group: mesh, taillightMats } = createCarModel(CONFIG.playerColor);

  const car = {
    id: carIdCounter++,
    mesh: mesh,
    lane: lane,
    progress: 50,
    speed: 0,
    targetSpeed: CONFIG.playerMaxSpeed,
    length: CONFIG.carLength,
    width: CONFIG.carWidth,
    color: CONFIG.playerColor,
    prevSpeed: 0,
    brakeIntensity: 0,
    taillightMats: taillightMats,
    isPlayer: true,
    laneChangeTimer: 0,
  };

  const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(car.progress));
  pos.y = 0.1;
  mesh.position.copy(pos);

  const forward = new THREE.Vector3(0, 0, 1);
  mesh.quaternion.setFromUnitVectors(forward, lane.dirVec);

  scene.add(mesh);
  lane.cars.push(car);
  cars.push(car);

  return car;
}

// Reverse travel direction
function reverseDirection() {
  if (gameOver) return;

  for (const lane of laneDefs) {
    // Flip direction
    lane.dir[0] *= -1;
    lane.dirVec.multiplyScalar(-1);
    // Swap start/end
    [lane.start, lane.end] = [lane.end, lane.start];
  }

  // Mirror all car progress
  for (const car of cars) {
    car.progress = car.lane.length - car.progress;
    const pos = car.lane.start.clone().add(car.lane.dirVec.clone().multiplyScalar(car.progress));
    pos.y = 0.1;
    car.mesh.position.copy(pos);
    const forward = new THREE.Vector3(0, 0, 1);
    car.mesh.quaternion.setFromUnitVectors(forward, car.lane.dirVec);
  }

  // Update score tracking
  if (playerCar) lastProgress = playerCar.progress;
}

});

// ============================================================
//  CAR SPAWNING & MANAGEMENT
// ============================================================
let spawnTimer = 0;

function spawnCar() {
  const lane = laneDefs[Math.floor(Math.random() * laneDefs.length)];

  const color = CONFIG.carColors[Math.floor(Math.random() * CONFIG.carColors.length)];
  const { group: mesh, taillightMats, turnSignalMats } = createCarModel(color);

  const difficulty = Math.min(gameTime / 120, 1);
  const speedBonus = difficulty * 10;
  const targetSpeed = CONFIG.carMinSpeed + speedBonus + Math.random() * (CONFIG.carMaxSpeed - CONFIG.carMinSpeed);

  // Start slightly past 0 with randomness to avoid collisions at spawn
  const startProgress = 1 + Math.random() * 8;

  const car = {
    id: carIdCounter++,
    mesh: mesh,
    lane: lane,
    progress: startProgress,
    speed: targetSpeed * 0.3,
    targetSpeed: targetSpeed,
    length: CONFIG.carLength,
    width: CONFIG.carWidth,
    color: color,
    stopped: false,
    prevSpeed: 0,
    brakeIntensity: 0,
    taillightMats: taillightMats,
    turnSignalMats: turnSignalMats,
    shockwaveIntensity: 0,
    shockwaveTimer: 0,
    slowdownTimer: 0,
    stuckTimer: 0,
    // Lane change state
    laneChange: null,      // null | { targetLane, timer, leftSignal }
    laneChangeCooldown: 0,
  };

  // Check if spawn position is clear (accounting for wrap-around)
  let blocked = false;
  for (const other of cars) {
    if (other.lane !== lane) continue;
    // Direct distance on the lane
    let dist = Math.abs(other.progress - startProgress);
    // Also check across the wrap boundary
    if (dist > lane.length * 0.5) dist = lane.length - dist;
    if (dist < car.length * 2.5) {
      blocked = true;
      break;
    }
  }
  if (blocked) {
    // Dispose the mesh we just created to avoid memory leak
    mesh.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => m.dispose());
        } else {
          child.material.dispose();
        }
      }
    });
    return null;
  }

  const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(startProgress));
  pos.y = 0.1;
  mesh.position.copy(pos);

  const forward = new THREE.Vector3(0, 0, 1);
  mesh.quaternion.setFromUnitVectors(forward, lane.dirVec);

  scene.add(mesh);
  lane.cars.push(car);
  cars.push(car);

  return car;
}

function removeCar(car) {
  scene.remove(car.mesh);
  const idx = cars.indexOf(car);
  if (idx !== -1) cars.splice(idx, 1);
  const lIdx = car.lane.cars.indexOf(car);
  if (lIdx !== -1) car.lane.cars.splice(lIdx, 1);
}

function getCarBehind(car) {
  const lane = car.lane;
  const sorted = [...lane.cars].sort((a, b) => b.progress - a.progress);
  const idx = sorted.indexOf(car);
  if (idx >= 0 && idx < sorted.length - 1) {
    const behind = sorted[idx + 1];
    // Don't propagate across the wrap boundary
    if (car.progress - behind.progress < lane.length * 0.5) return behind;
  }
  return null;
}

// ============================================================
//  CAR PHYSICS UPDATE
// ============================================================
function updatePlayer(dt) {
  if (!playerCar || gameOver) return;

  // Lane switching (with cooldown)
  if (playerCar.laneChangeTimer > 0) {
    playerCar.laneChangeTimer -= dt;
  } else {
    // Determine which lane is "left" relative to the car's facing direction
    const leftVec = new THREE.Vector3().crossVectors(
      playerCar.lane.dirVec, new THREE.Vector3(0, 1, 0)
    ).multiplyScalar(-1).normalize();
    // Lane with higher Z component is the "leftwards" lane (from camera view)
    const leftIsHighZ = leftVec.z > 0;
    const leftLane = leftIsHighZ ? laneDefs[1] : laneDefs[0];
    const rightLane = leftIsHighZ ? laneDefs[0] : laneDefs[1];

    if (isLeft() && playerCar.lane !== leftLane) {
      playerCar.lane = leftLane;
      playerCar.laneChangeTimer = 0.3;
    } else if (isRight() && playerCar.lane !== rightLane) {
      playerCar.lane = rightLane;
      playerCar.laneChangeTimer = 0.3;
    }
  }

  // Acceleration / braking
  if (isAccel()) {
    playerCar.speed = Math.min(playerCar.speed + CONFIG.playerAccel * dt, 200 / 2.237);
  } else if (isBrake()) {
    playerCar.speed = Math.max(playerCar.speed - CONFIG.playerBrake * dt, 0);
    if (playerCar.speed > 5) playBrakeSound(Math.min(1, playerCar.speed * 0.03));
  } else {
    // Gentle natural deceleration (engine braking)
    playerCar.speed = Math.max(playerCar.speed - 2 * dt, 0);
  }

  // Engine sound
  updateEngineSound(playerCar.speed);

  // Speed — under-speed warning & overspeed penalty
  const mph = playerCar.speed * 2.237;

  // Overspeed penalty — deduct points when exceeding 70 mph
  const OVERSPEED_LIMIT = 70;
  if (mph > OVERSPEED_LIMIT) {
    score = Math.max(0, score - (mph - OVERSPEED_LIMIT) * dt * 0.5);
  }

  // Brake lights
  const rawBrake = (playerCar.prevSpeed - playerCar.speed) / (CONFIG.playerBrake * dt + 0.001);
  playerCar.brakeIntensity = Math.max(0, Math.min(rawBrake, 1));
  for (const mat of playerCar.taillightMats) {
    mat.emissiveIntensity = 0.12 + playerCar.brakeIntensity * 3.2;
    mat.color.setHex(playerCar.brakeIntensity > 0.2 ? 0xff3300 : 0xcc1100);
  }
  playerCar.prevSpeed = playerCar.speed;

  // Update position
  playerCar.progress += playerCar.speed * dt;
  if (playerCar.progress >= playerCar.lane.length) {
    playerCar.progress -= playerCar.lane.length;
  }

  // Score = distance traveled
  const progressDelta = playerCar.progress - lastProgress;
  if (progressDelta > 0) {
    score += progressDelta;
  } else if (progressDelta < -playerCar.lane.length * 0.5) {
    // Wrapped around
    score += (playerCar.lane.length - lastProgress) + playerCar.progress;
  }
  lastProgress = playerCar.progress;

  // Update mesh position
  const targetPos = playerCar.lane.start.clone()
    .add(playerCar.lane.dirVec.clone().multiplyScalar(playerCar.progress));
  targetPos.y = 0.1;
  const dist = playerCar.mesh.position.distanceTo(targetPos);
  if (dist > 100) {
    playerCar.mesh.position.copy(targetPos);  // instant snap on wrap
    // Checkpoint flash
    const flash = document.getElementById('checkpoint-flash');
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 200);
  } else {
    playerCar.mesh.position.lerp(targetPos, 0.25);  // smooth lane changes
  }

  // Dynamic FOV based on speed
  const baseFOV = 50;
  const speedFOV = baseFOV + Math.min(mph * 0.15, 15); // up to +15° FOV
  camera.fov += (speedFOV - camera.fov) * 0.1;
  camera.updateProjectionMatrix();

  // Speed lines — more lines at higher speed
  const linesContainer = document.getElementById('speed-lines');
  const targetLines = Math.floor(mph / 8); // 1 line per 8 mph, max ~25 lines
  const clampedLines = Math.max(0, Math.min(targetLines, 25));
  if (clampedLines > 0) {
    linesContainer.classList.add('active');
  } else {
    linesContainer.classList.remove('active');
  }
  // Add/remove lines to match target
  const currentLines = linesContainer.children.length;
  if (currentLines < clampedLines) {
    for (let i = currentLines; i < clampedLines; i++) {
      const line = document.createElement('div');
      line.className = 'line';
      line.style.left = Math.random() * 100 + '%';
      line.style.animationDuration = (0.5 + Math.random() * 1.5) + 's';
      line.style.opacity = 0.3 + Math.random() * 0.5;
      linesContainer.appendChild(line);
    }
  } else if (currentLines > clampedLines) {
    while (linesContainer.children.length > clampedLines) {
      linesContainer.removeChild(linesContainer.lastChild);
    }
  }

  const forward = new THREE.Vector3(0, 0, 1);
  const targetQuat = new THREE.Quaternion().setFromUnitVectors(forward, playerCar.lane.dirVec);
  playerCar.mesh.quaternion.slerp(targetQuat, 0.2);

  // Horn — if AI car is close behind and we're too slow
  hornTimer = Math.max(0, hornTimer - dt);
  for (const other of cars) {
    if (other === playerCar || other.isPlayer) continue;
    if (other.lane !== playerCar.lane) continue;
    let gap = other.progress - playerCar.progress;
    if (gap < 0) gap += playerCar.lane.length; // handle wrap
    if (gap > 0 && gap < playerCar.length * 2.5 && playerCar.speed < other.speed * 0.7) {
      if (hornTimer <= 0) { playHorn(); hornTimer = 2.5; }
    }
  }

  // Check collisions with AI cars
  for (const other of cars) {
    if (other === playerCar || other.isPlayer) continue;
    if (other.lane !== playerCar.lane) continue;
    const gap = playerCar.progress - other.progress;
    const absGap = Math.abs(gap);
    const wrapGap = playerCar.lane.length - absGap;
    const minGap = Math.min(absGap, wrapGap);
    if (minGap < (playerCar.length + other.length) * 0.45) {
      triggerGameOver();
      return;
    }
  }

  // Update UI
  document.getElementById('mph-display').textContent = Math.round(mph);
  const mphEl = document.getElementById('mph-display');
  const isOverspeed = mph > 70;
  mphEl.className = 'mph' + (isOverspeed ? ' overspeed' : mph < CONFIG.minSafeSpeed ? ' warn' : '');
  document.getElementById('overspeed-label').classList.toggle('active', isOverspeed);
  document.getElementById('score').textContent = Math.round(score);
  // Lane indicator — account for car direction
  if (playerCar) {
    const leftVec = new THREE.Vector3().crossVectors(
      playerCar.lane.dirVec, new THREE.Vector3(0, 1, 0)
    ).multiplyScalar(-1);
    const leftLane = leftVec.z > 0 ? laneDefs[1] : laneDefs[0];
    const rightLane = leftVec.z > 0 ? laneDefs[0] : laneDefs[1];
    document.getElementById('lane-dot-0').classList.toggle('active', playerCar.lane === leftLane);
    document.getElementById('lane-dot-1').classList.toggle('active', playerCar.lane === rightLane);
  }
}

function triggerGameOver() {
  gameOver = true;
  // Crash sound + silence engine
  playCrashSound();
  if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);

  // Screen flash — red overlay
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,0,0,0.4);z-index:200;pointer-events:none;transition:opacity 0.4s;';
  document.body.appendChild(flash);
  requestAnimationFrame(() => { flash.style.opacity = '0'; });
  setTimeout(() => flash.remove(), 500);

  // Car on fire — glow the body + create flame particles
  playerCar.mesh.traverse(child => {
    if (child.isMesh && child.material && child.material.emissive) {
      child.material.emissive.set(0xff4400);
      child.material.emissiveIntensity = 0.7;
    }
  });

  fireGroup = new THREE.Group();
  const firePos = playerCar.mesh.position.clone();
  firePos.y += 1.0;
  fireGroup.position.copy(firePos);
  const flameColors = [0xff2200, 0xff6600, 0xffaa00, 0xffcc00];
  for (let i = 0; i < 14; i++) {
    const geom = new THREE.ConeGeometry(0.3 + Math.random() * 0.4, 0.6 + Math.random() * 1.2, 8);
    const mat = new THREE.MeshStandardMaterial({
      color: flameColors[Math.floor(Math.random() * flameColors.length)],
      emissive: flameColors[Math.floor(Math.random() * flameColors.length)],
      emissiveIntensity: 1.2,
      roughness: 0.2,
      transparent: true,
      opacity: 0.9,
    });
    const flame = new THREE.Mesh(geom, mat);
    flame.position.set((Math.random() - 0.5) * 1.5, Math.random() * 0.8, (Math.random() - 0.5) * 2.0);
    flame.userData = { baseY: flame.position.y, speed: 0.4 + Math.random() * 0.8, phase: Math.random() * Math.PI * 2 };
    fireGroup.add(flame);
  }
  console.log('🔥 Fire at', fireGroup.position.toArray().map(v => v.toFixed(1)));
  scene.add(fireGroup);

  // Manual cinematic orbit — disable controls, fly camera ourselves
  controls.enabled = false;
  gameOverAngle = 0;

  // Show game over with a 3-second delay — enjoy the fire
  setTimeout(() => {
    document.getElementById('final-score').textContent = Math.round(score);
    document.getElementById('game-over').classList.add('active');
  }, 3000);
}

function restartGame() {
  // Remove all cars
  for (let i = cars.length - 1; i >= 0; i--) {
    scene.remove(cars[i].mesh);
  }
  for (const lane of laneDefs) lane.cars.length = 0;
  cars.length = 0;
  carIdCounter = 0;

  // Remove fire
  if (fireGroup) {
    scene.remove(fireGroup);
    fireGroup.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    fireGroup = null;
  }

  // Reset state
  gameOver = false;
  score = 0;
  gameTime = 0;
  lastProgress = 0;
  spawnTimer = 0;

  // Reset view — keep FPV mode active
  if (viewMode === 'fpv') {
    controls.enabled = false;
  }

  // Hide game over
  document.getElementById('game-over').classList.remove('active');
  document.getElementById('mph-display').textContent = '0';
  document.getElementById('mph-display').className = 'mph';
  document.getElementById('overspeed-label').classList.remove('active');
  document.getElementById('score').textContent = '0';

  // Reset effects
  document.getElementById('speed-lines').innerHTML = '';
  document.getElementById('speed-lines').classList.remove('active');
  camera.fov = 50;
  camera.updateProjectionMatrix();

  // Create player and initial traffic
  playerCar = createPlayerCar();
  lastProgress = playerCar.progress;
  spawnInitialCars(20);

  // Snap camera to player
  if (viewMode === 'top') {
    const startPos = playerCar.mesh.position.clone();
    const startDir = playerCar.lane.dirVec.clone();
    const camStart = startPos.clone()
      .add(startDir.clone().multiplyScalar(-chaseDistance))
      .add(new THREE.Vector3(0, chaseDistance * 0.7, 0));
    camera.position.copy(camStart);
    camera.lookAt(startPos);
  }
}

function updateCars(dt, simSpeed) {
  const adjustedDt = dt * simSpeed;

  for (const lane of laneDefs) {
    lane.cars.sort((a, b) => b.progress - a.progress);
  }

  for (let i = cars.length - 1; i >= 0; i--) {
    const car = cars[i];
    if (car.isPlayer) continue; // skip player — handled by updatePlayer
    const lane = car.lane;

    let desired = car.targetSpeed;

    // 0. Congestion near road wrap point — cars slow down approaching the end
    const distToWrap = lane.length - car.progress;
    if (distToWrap < 350) {
      const congestionFactor = Math.max(0.3, distToWrap / 350);
      desired = Math.min(desired, car.targetSpeed * congestionFactor);
      if (distToWrap < 100) {
        car.slowdownTimer = Math.max(car.slowdownTimer, 0.5);
      }
    }

    // 1. Random slowdown event (originates a braking shockwave)
    if (car.slowdownTimer > 0) {
      car.slowdownTimer -= adjustedDt;
      const factor = Math.min(car.slowdownTimer / CONFIG.slowdownDuration, 1);
      desired = Math.min(desired, car.targetSpeed * (0.2 + 0.5 * factor));
      if (car.slowdownTimer <= 0) {
        car.slowdownTimer = 0;
      }
    } else if (Math.random() < CONFIG.slowdownChance) {
      car.slowdownTimer = CONFIG.slowdownDuration + Math.random() * 1.0;
      if (car.shockwaveIntensity < 0.01) {
        car.shockwaveIntensity = 0.6 + Math.random() * 0.4;
        car.shockwaveTimer = 0.08;
      }
    }

    // 2. Car ahead – closing-speed based following
    const laneCars = lane.cars;
    const myIndex = laneCars.indexOf(car);
    if (myIndex > 0) {
      const ahead = laneCars[myIndex - 1];
      // Skip wrap-boundary pairs (gap > half the lane = not really adjacent)
      const rawGap = ahead.progress - car.progress;
      if (rawGap < lane.length * 0.5) {
        const dist = (ahead.progress - ahead.length / 2) - (car.progress + car.length / 2);
        const minGap = 2.0;
        const closingSpeed = Math.max(car.speed - ahead.speed, 0);

        if (dist < minGap * 0.6) {
          desired = Math.min(desired, Math.max(ahead.speed * 0.5, 0));
        }
        else if (closingSpeed > 0.3 && dist < minGap + closingSpeed * 3.0) {
          const availableDist = Math.max(dist - minGap, 0.01);
          const needed = (closingSpeed * closingSpeed) / (2 * CONFIG.carBrake) + 0.3;
          if (needed > availableDist * 1.15) {
            desired = Math.min(desired, Math.max(ahead.speed * 0.7, 0));
          } else {
            const safeClosing = Math.sqrt(2 * CONFIG.carBrake * availableDist);
            desired = Math.min(desired, ahead.speed + safeClosing);
          }
        }
      }
    }

    // 3. Shockwave propagation
    if (car.shockwaveIntensity > 0.01) {
      const brakeFactor = 1 - car.shockwaveIntensity * 0.55;
      desired = Math.min(desired, Math.max(car.speed * brakeFactor, 0));
      if (car.speed < 0.3) desired = 0;

      car.shockwaveTimer -= adjustedDt;
      if (car.shockwaveTimer <= 0) {
        const behind = getCarBehind(car);
        if (behind && behind.shockwaveIntensity < 0.05) {
          behind.shockwaveIntensity = car.shockwaveIntensity * 0.82;
          behind.shockwaveTimer = 0.25 + Math.random() * 0.18;
        }
        car.shockwaveIntensity = 0;
      }
    }

    // Detect hard deceleration to ORIGINATE a shockwave
    const decel = (car.prevSpeed - car.speed) / Math.max(adjustedDt, 0.001);
    if (decel > 5 && desired < car.speed * 0.7 && car.shockwaveIntensity < 0.01) {
      car.shockwaveIntensity = Math.min(decel / 12, 1.2);
      car.shockwaveTimer = 0.12;
    }

    // 5. Deadlock breaker — if crawling >4 s, force‑accelerate
    if (car.speed < 0.5) {
      car.stuckTimer += adjustedDt;
      if (car.stuckTimer > 4.0) {
        desired = car.targetSpeed;
        car.shockwaveIntensity = 0;
        car.slowdownTimer = 0;
        car.stuckTimer = 0;
      }
    } else {
      car.stuckTimer = Math.max(0, car.stuckTimer - adjustedDt * 0.5);
    }

    // Accelerate / Brake
    if (desired < car.speed) {
      car.speed = Math.max(car.speed - CONFIG.carBrake * adjustedDt, desired);
    } else if (desired > car.speed) {
      car.speed = Math.min(car.speed + CONFIG.carAccel * adjustedDt, desired);
    }
    car.speed = Math.max(0, car.speed);

    // Brake intensity for taillight glow
    const rawBrake = (car.prevSpeed - car.speed) / (CONFIG.carBrake * adjustedDt + 0.001);
    car.brakeIntensity = Math.max(0, Math.min(rawBrake, 1));
    if (car.shockwaveIntensity > 0.01) {
      car.brakeIntensity = Math.max(car.brakeIntensity, car.shockwaveIntensity * 0.7);
    }
    for (const mat of car.taillightMats) {
      mat.emissiveIntensity = 0.12 + car.brakeIntensity * 3.2;
      mat.color.setHex(car.brakeIntensity > 0.2 ? 0xff3300 : 0xcc1100);
    }
    car.prevSpeed = car.speed;

    // Update position
    car.progress += car.speed * adjustedDt;

    // ★ NEVER-ENDING LOOP — wrap around instead of removing
    if (car.progress >= lane.length) {
      car.progress -= lane.length;
      // Skip past the spawn zone so wrapping cars don't block new spawns
      const spawnZoneEnd = 18;
      if (car.progress < spawnZoneEnd) {
        car.progress = spawnZoneEnd + Math.random() * 8;
      }
    }

    // Update mesh
    const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(car.progress));
    pos.y = 0.1;
    car.mesh.position.copy(pos);

    const forward = new THREE.Vector3(0, 0, 1);
    const targetQuat = new THREE.Quaternion().setFromUnitVectors(forward, lane.dirVec);
    car.mesh.quaternion.slerp(targetQuat, 0.15);

    // ---- Lane change AI ----
    car.laneChangeCooldown = Math.max(0, car.laneChangeCooldown - adjustedDt);

    if (!car.laneChange && car.laneChangeCooldown <= 0 && car.speed > 2) {
      // Check if blocked by a slower car ahead
      const myIdx = lane.cars.indexOf(car);
      let blocked = false;
      if (myIdx > 0) {
        const ahead = lane.cars[myIdx - 1];
        if (ahead.progress - car.progress < car.length * 5 && car.speed > ahead.speed * 1.05) {
          blocked = true;
        }
      }
      // 15% chance per second if blocked, 0.5% otherwise
      const chance = blocked ? 0.15 : 0.005;
      if (Math.random() < chance * adjustedDt) {
        const otherLane = car.lane === laneDefs[0] ? laneDefs[1] : laneDefs[0];
        const leftSignal = car.lane === laneDefs[1]; // signal toward the other lane

        // Check if target lane has space
        let spaceClear = true;
        for (const other of cars) {
          if (other === car || other.lane !== otherLane) continue;
          let dist = Math.abs(other.progress - car.progress);
          if (dist > otherLane.length * 0.5) dist = otherLane.length - dist;
          if (dist < car.length * 3.5) { spaceClear = false; break; }
        }
        if (spaceClear) {
          car.laneChange = {
            targetLane: otherLane,
            timer: 1.5,  // ~5 blinks at ~3.3 Hz
            leftSignal: leftSignal,
          };
        }
      }
    }

    // Execute lane change or blink signals
    if (car.laneChange) {
      car.laneChange.timer -= adjustedDt;
      const blinkOn = Math.floor(car.laneChange.timer * 3.3) % 2 === 0;
      const sigIdx = car.laneChange.leftSignal ? 0 : 1;
      car.turnSignalMats[sigIdx].emissiveIntensity = blinkOn ? 1.5 : 0.1;
      car.turnSignalMats[1 - sigIdx].emissiveIntensity = 0;
      car.turnSignalMats[sigIdx].color.setHex(blinkOn ? 0xffaa00 : 0x663300);

      if (car.laneChange.timer <= 0) {
        // Switch lanes
        car.lane.cars.splice(car.lane.cars.indexOf(car), 1);
        car.laneChange.targetLane.cars.push(car);
        car.lane = car.laneChange.targetLane;
        car.laneChange = null;
        car.laneChangeCooldown = 3 + Math.random() * 5;
        car.turnSignalMats[0].emissiveIntensity = 0;
        car.turnSignalMats[1].emissiveIntensity = 0;
      }
    } else {
      car.turnSignalMats.forEach(m => { m.emissiveIntensity = 0; });
    }
  }
}

// ============================================================
//  COLLISION DETECTION & RESOLUTION
// ============================================================
function resolveCollisions() {
  // Same-lane rear-end prevention (AI cars only — player handled separately)
  for (const lane of laneDefs) {
    const sorted = [...lane.cars].filter(c => !c.isPlayer).sort((a, b) => a.progress - b.progress);
    for (let j = 1; j < sorted.length; j++) {
      const lead = sorted[j];
      const follow = sorted[j - 1];
      const gap = (lead.progress - lead.length / 2) - (follow.progress + follow.length / 2);
      const minSpace = 1.0;
      if (gap < minSpace) {
        const push = Math.max((minSpace - gap) / 2, 0.01);
        lead.progress = Math.min(lead.progress + push, lead.lane.length - 0.1);
        follow.progress = Math.max(follow.progress - push, 0);
      }
    }
  }

  // Sync AI mesh positions (skip player)
  for (const car of cars) {
    if (car.isPlayer) continue;
    const pos = car.lane.start.clone()
      .add(car.lane.dirVec.clone().multiplyScalar(car.progress));
    pos.y = 0.1;
    car.mesh.position.copy(pos);
  }
}

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//  ANIMATION LOOP
// ============================================================
let lastTime = 0;

function animate(time) {
  if (gameOver) {
    // Animate fire
    const dt = 0.016; // ~60fps approximation for orbit
    if (fireGroup && playerCar) {
      fireGroup.position.copy(playerCar.mesh.position);
      fireGroup.position.y += 1.0;
      const firePos = fireGroup.position;
      // Manual orbit — camera circles the burning car
      gameOverAngle += dt * 0.6;
      const orbitDist = 6;
      const camX = firePos.x + Math.cos(gameOverAngle) * orbitDist;
      const camZ = firePos.z + Math.sin(gameOverAngle) * orbitDist;
      const camY = firePos.y + 2.5 + Math.sin(gameOverAngle * 0.7) * 1.5;
      camera.position.set(camX, camY, camZ);
      camera.lookAt(firePos);
      const t = time * 0.001;
      fireGroup.children.forEach(flame => {
        const u = flame.userData;
        flame.position.y = u.baseY + Math.sin(t * u.speed * 3 + u.phase) * 0.3;
        flame.scale.setScalar(0.7 + Math.sin(t * u.speed * 5 + u.phase) * 0.3);
        flame.material.opacity = 0.5 + Math.sin(t * u.speed * 4 + u.phase + 1) * 0.3;
      });
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
    return;
  }

  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  if (!gameOver) gameTime += dt;

  // Spawn AI cars — difficulty scales with gameTime
  const difficulty = Math.min(gameTime / 120, 1); // ramps up over 2 minutes
  spawnTimer += dt;
  const spawnInterval = CONFIG.spawnIntervalBase * (1 - difficulty * 0.75); // 1.2s → 0.3s
  const maxCars = Math.floor(40 + difficulty * 80); // 40 → 120
  const spawnBatch = Math.floor(3 + difficulty * 3); // 3 → 6 cars per batch
  if (spawnTimer >= spawnInterval && cars.length < maxCars) {
    spawnTimer = 0;
    for (let a = 0; a < spawnBatch; a++) {
      if (spawnCar() !== null) break;
    }
  }

  // Update player
  updatePlayer(dt);
  if (gameOver) {
    if (fireGroup && playerCar) {
      fireGroup.position.copy(playerCar.mesh.position);
      fireGroup.position.y += 1.0;
      const firePos = fireGroup.position;
      gameOverAngle += dt * 0.6;
      const orbitDist = 6;
      camera.position.set(
        firePos.x + Math.cos(gameOverAngle) * orbitDist,
        firePos.y + 2.5 + Math.sin(gameOverAngle * 0.7) * 1.5,
        firePos.z + Math.sin(gameOverAngle) * orbitDist
      );
      camera.lookAt(firePos);
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
    return;
  }

  // Update AI cars
  updateCars(dt, 1.0);
  resolveCollisions();

  // Camera
  if (playerCar) {
    if (viewMode === 'fpv') {
      // First-person view behind the player car
      const pos = playerCar.mesh.position.clone();
      const dir = playerCar.lane.dirVec.clone();
      // Position camera behind and above the car
      const camPos = pos.clone()
        .add(dir.clone().multiplyScalar(-8))  // 8m behind
        .add(new THREE.Vector3(0, 4, 0));     // 4m above
      camera.position.lerp(camPos, 0.15);
      // Look at a point ahead of the car
      const lookTarget = pos.clone()
        .add(dir.clone().multiplyScalar(30))
        .add(new THREE.Vector3(0, 1.5, 0));
      camera.lookAt(lookTarget);
    } else {
      // Top-down chase cam — follow behind and above the player
      const pos = playerCar.mesh.position.clone();
      const dir = playerCar.lane.dirVec.clone();
      const idealPos = pos.clone()
        .add(dir.clone().multiplyScalar(-chaseDistance))
        .add(new THREE.Vector3(0, chaseDistance * 0.7, 0));
      camera.position.lerp(idealPos, 0.15);
      camera.lookAt(pos);
    }
  }

  document.getElementById('car-count').textContent = cars.length;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// ============================================================
//  INIT
// ============================================================

function spawnInitialCars(count) {
  for (let i = 0; i < count; i++) {
    const lane = laneDefs[Math.floor(Math.random() * laneDefs.length)];
    const color = CONFIG.carColors[Math.floor(Math.random() * CONFIG.carColors.length)];
    const { group: mesh, taillightMats, turnSignalMats } = createCarModel(color);
    const difficulty = Math.min(gameTime / 120, 1);
    const speedBonus = difficulty * 10;
    const targetSpeed = CONFIG.carMinSpeed + speedBonus + Math.random() * (CONFIG.carMaxSpeed - CONFIG.carMinSpeed);

    // Random starting position spread across the lane
    const startProgress = 10 + Math.random() * (lane.length * 0.85);

    const car = {
      id: carIdCounter++,
      mesh: mesh,
      lane: lane,
      progress: startProgress,
      speed: targetSpeed * (0.3 + Math.random() * 0.7),
      targetSpeed: targetSpeed,
      length: CONFIG.carLength,
      width: CONFIG.carWidth,
      color: color,
      stopped: false,
      prevSpeed: targetSpeed * 0.5,
      brakeIntensity: 0,
      taillightMats: taillightMats,
      turnSignalMats: turnSignalMats,
      shockwaveIntensity: 0,
      shockwaveTimer: 0,
      slowdownTimer: 0,
      stuckTimer: 0,
      laneChange: null,
      laneChangeCooldown: 0,
    };

    const pos = lane.start.clone().add(lane.dirVec.clone().multiplyScalar(startProgress));
    pos.y = 0.1;
    mesh.position.copy(pos);

    const forward = new THREE.Vector3(0, 0, 1);
    mesh.quaternion.setFromUnitVectors(forward, lane.dirVec);

    scene.add(mesh);
    lane.cars.push(car);
    cars.push(car);
  }
}

// ---- Start game ----
playerCar = createPlayerCar();
lastProgress = playerCar.progress;
spawnInitialCars(20);

// Snap camera to player immediately
if (viewMode === 'top') {
  const startPos = playerCar.mesh.position.clone();
  const startDir = playerCar.lane.dirVec.clone();
  camera.position.copy(startPos.clone().add(startDir.clone().multiplyScalar(-chaseDistance)).add(new THREE.Vector3(0, chaseDistance * 0.7, 0)));
  camera.lookAt(startPos);
} else {
  // FPV — snap behind the car
  const startPos = playerCar.mesh.position.clone();
  const startDir = playerCar.lane.dirVec.clone();
  camera.position.copy(startPos.clone().add(startDir.clone().multiplyScalar(-8)).add(new THREE.Vector3(0, 4, 0)));
  camera.lookAt(startPos.clone().add(startDir.clone().multiplyScalar(30)).add(new THREE.Vector3(0, 1.5, 0)));
}

// Restart button
document.getElementById('btn-restart').addEventListener('click', restartGame);
document.getElementById('btn-reset').addEventListener('click', restartGame);

animate(0);

console.log('🏎️ Scenic Route ready!');
console.log(`🚗 Player car #${playerCar.id}, ${cars.length} total cars, ${laneDefs.length} lanes`);
console.log(`👁️ View mode: ${viewMode} | Camera pos: (${camera.position.x.toFixed(0)}, ${camera.position.y.toFixed(1)}, ${camera.position.z.toFixed(1)}) | Player at: (${playerCar.mesh.position.x.toFixed(0)}, ${playerCar.mesh.position.y.toFixed(1)}, ${playerCar.mesh.position.z.toFixed(1)})`);
</script>
